<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ampersend — Assessment</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --blue:#1a6eff;--black:#1a1a1a;--white:#fff;--surface:#f5f5f3;
      --border:#e2e2e2;--muted:#888;--blue-light:#e8f0ff;
      --green:#1e7e34;--green-light:#e6f4ea;
      --amber:#BA7517;--amber-light:#fff8e1;
      --red:#dc3545;--red-light:#fff0f0;
    }
    html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--black);background:var(--surface);min-height:100vh;}
    nav{height:52px;background:var(--white);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:100;}
    .nl{display:flex;align-items:center;gap:12px;}
    .logo{font-size:16px;font-weight:600;letter-spacing:-0.03em;color:var(--black);text-decoration:none;}
    .logo span{color:var(--blue);}
    .nsep{width:0.5px;height:18px;background:var(--border);}
    .ntitle{font-size:13px;font-weight:500;}
    .nr{display:flex;align-items:center;gap:8px;}
    .nbtn{padding:6px 12px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--white);color:var(--black);display:flex;align-items:center;gap:5px;font-family:inherit;text-decoration:none;}
    .nbtn:hover{background:var(--surface);}
    .nbtn.primary{background:var(--black);color:#fff;border-color:var(--black);}
    .nbtn.primary:hover{background:#333;}

    .main{padding:1.5rem;max-width:900px;margin:0 auto;}

    /* API KEY BANNER */
    .api-banner{background:var(--amber-light);border:0.5px solid var(--amber);border-radius:6px;padding:12px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .api-banner i{color:var(--amber);font-size:16px;flex-shrink:0;}
    .api-banner-text{font-size:13px;font-weight:500;color:var(--black);}
    .api-banner input{flex:1;min-width:200px;font-size:13px;padding:7px 10px;border:0.5px solid var(--border);border-radius:4px;font-family:inherit;background:var(--white);}
    .api-banner input:focus{outline:none;border-color:var(--blue);}
    .api-saved{background:var(--green-light);border-color:var(--green);color:var(--green);font-size:12px;padding:3px 9px;border-radius:3px;font-weight:500;}

    /* TABS */
    .tabs{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:1.5rem;background:var(--white);border-radius:8px 8px 0 0;border:0.5px solid var(--border);overflow:hidden;}
    .tab{padding:12px 20px;font-size:13px;cursor:pointer;border:none;border-bottom:2px solid transparent;color:var(--muted);background:none;font-family:inherit;transition:color 0.15s;display:flex;align-items:center;gap:6px;}
    .tab.active{color:var(--black);border-bottom-color:var(--blue);font-weight:500;background:var(--white);}
    .tab:hover:not(.active){color:var(--black);background:var(--surface);}
    .panel{display:none;} .panel.active{display:block;}

    /* CARDS */
    .card{background:var(--white);border:0.5px solid var(--border);border-radius:6px;padding:1.25rem;margin-bottom:1rem;}
    .sec-label{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
    .fg{display:flex;flex-direction:column;gap:4px;margin-bottom:0;}
    .fg label{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:0.04em;text-transform:uppercase;}
    .fg input,.fg select,.fg textarea{font-size:13px;padding:8px 10px;border:0.5px solid var(--border);border-radius:4px;background:var(--white);color:var(--black);width:100%;font-family:inherit;}
    .fg textarea{resize:vertical;min-height:80px;}
    .fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,110,255,0.08);}

    /* ROOMS */
    .rooms-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;min-height:28px;}
    .room-tag{display:inline-flex;align-items:center;gap:6px;background:var(--blue-light);color:var(--blue);font-size:12px;padding:4px 10px;border-radius:3px;font-weight:500;}
    .room-tag button{background:none;border:none;color:var(--blue);cursor:pointer;font-size:16px;padding:0;line-height:1;}
    .room-row{display:flex;gap:8px;align-items:flex-end;}
    .room-row .fg{flex:1;}

    /* BUTTONS */
    .btn{padding:8px 16px;border-radius:4px;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:inherit;border:0.5px solid var(--border);background:var(--white);color:var(--black);}
    .btn:hover{background:var(--surface);}
    .btn:disabled{opacity:0.5;cursor:not-allowed;}
    .btn-black{background:var(--black);color:#fff;border-color:var(--black);}
    .btn-black:hover:not(:disabled){background:#333;}
    .btn-blue{background:var(--blue);color:#fff;border-color:var(--blue);}
    .btn-blue:hover{background:#155ee0;}
    .btn-sm{padding:5px 12px;font-size:12px;}

    /* AI AREA */
    .ai-box{background:var(--surface);border:0.5px solid var(--border);border-radius:6px;padding:1rem;margin-bottom:1rem;}
    .ai-box.thinking{border-color:var(--blue);background:var(--blue-light);}
    .ai-box.clarify{border-color:var(--amber);background:var(--amber-light);}
    .ai-box.success{border-color:var(--green);background:var(--green-light);}
    .ai-label{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
    .ai-label.blue{color:var(--blue);}
    .ai-label.amber{color:var(--amber);}
    .ai-label.green{color:var(--green);}
    .ai-msg{font-size:13px;line-height:1.6;}
    .clarify-q{margin-bottom:12px;}
    .clarify-q p{font-size:13px;margin-bottom:7px;font-weight:500;}
    .clarify-q .options{display:flex;flex-wrap:wrap;gap:6px;}
    .clarify-q .options button{padding:5px 13px;border-radius:3px;font-size:12px;border:0.5px solid var(--border);background:var(--white);cursor:pointer;font-family:inherit;}
    .clarify-q .options button:hover,.clarify-q .options button.picked{background:var(--blue-light);border-color:var(--blue);color:var(--blue);}

    /* LINE ITEMS */
    .items-head{display:grid;grid-template-columns:2.5fr 85px 70px 85px 32px;gap:8px;font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);padding:0 2px 8px;border-bottom:0.5px solid var(--border);}
    .line-row{display:grid;grid-template-columns:2.5fr 85px 70px 85px 32px;gap:8px;align-items:start;padding:6px 0;border-bottom:0.5px solid var(--surface);}
    .line-row input,.line-row select{font-size:13px;padding:6px 8px;border:0.5px solid var(--border);border-radius:4px;background:var(--white);color:var(--black);width:100%;font-family:inherit;}
    .line-row input:focus,.line-row select:focus{outline:none;border-color:var(--blue);}
    .line-desc{display:flex;flex-direction:column;gap:3px;}
    .code-note{font-size:10px;color:var(--blue);font-style:italic;padding:0 2px;}
    .del-btn{background:none;border:0.5px solid var(--border);border-radius:4px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:14px;margin-top:1px;}
    .del-btn:hover{background:var(--red-light);border-color:#ffaaaa;color:var(--red);}
    .add-btn{background:none;border:0.5px dashed var(--border);border-radius:4px;padding:8px 14px;font-size:12px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;width:100%;justify-content:center;margin-top:8px;}
    .add-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light);}
    .totals{display:flex;justify-content:flex-end;margin-top:1.25rem;}
    .totals-inner{min-width:260px;}
    .t-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:#555;}
    .t-grand{display:flex;justify-content:space-between;font-size:17px;font-weight:600;border-top:2px solid var(--black);margin-top:6px;padding-top:10px;}
    .t-grand span:last-child{color:var(--blue);}
    .action-bar{display:flex;gap:10px;margin-top:1.5rem;padding-top:1.25rem;border-top:0.5px solid var(--border);flex-wrap:wrap;}

    /* BADGE */
    .badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:2px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;}
    .badge-labour{background:var(--amber-light);color:var(--amber);}
    .badge-material{background:var(--blue-light);color:var(--blue);}
    .badge-permit{background:var(--green-light);color:var(--green);}
    .badge-other{background:var(--surface);color:var(--muted);}

    /* EMAIL TOAST */
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9000;background:var(--black);color:#fff;padding:10px 16px;border-radius:6px;font-size:13px;display:none;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,0.2);}
    .toast.show{display:flex;}

    .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--blue-light);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:-3px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    @media print{
      nav{display:none;}
      .main{padding:0;max-width:100%;}
      .tabs,.action-bar,.api-banner{display:none!important;}
      .panel{display:block!important;}
      #tab-build{display:none!important;}
      #tab-items{display:block!important;}
    }
    @media(max-width:600px){
      .g4{grid-template-columns:1fr 1fr;}
      .items-head,.line-row{grid-template-columns:1fr 70px 60px 32px;}
      .items-head span:nth-child(2),.line-row>select{display:none;}
    }
  </style>
</head>
<body>
<nav>
  <div class="nl">
    <a href="/index.html" class="logo">Ampers<span>&</span>nd</a>
    <div class="nsep"></div>
    <span class="ntitle">Assessment</span>
  </div>
  <div class="nr">
    <a href="/projects.html" class="nbtn"><i class="ti ti-list"></i> Projects</a>
    <a href="/tracker.html" class="nbtn"><i class="ti ti-map-pin"></i> Map</a>
  </div>
</nav>

<div class="main">

  <!-- API KEY BANNER -->
  <div id="api-banner" class="api-banner">
    <i class="ti ti-key"></i>
    <span class="api-banner-text">Enter your Anthropic API key to enable AI assessment</span>
    <input type="password" id="api-key-input" placeholder="sk-ant-..."/>
    <button class="btn btn-sm btn-black" onclick="saveKey()">Save key</button>
    <span style="font-size:11px;color:var(--muted)">Stored locally in your browser only</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('build',this)"><i class="ti ti-sparkles"></i> Build assessment</button>
    <button class="tab" onclick="switchTab('items',this)"><i class="ti ti-list"></i> Line items</button>
  </div>

  <!-- BUILD TAB -->
  <div id="tab-build" class="panel active">
    <div class="card">
      <div class="sec-label">Assessment details</div>
      <div class="g4" style="gap:10px">
        <div class="fg"><label>Assessment #</label><input type="text" id="est-num" value="EST-001"/></div>
        <div class="fg"><label>Date issued</label><input type="date" id="est-date"/></div>
        <div class="fg"><label>Customer name</label><input type="text" id="cust-name" placeholder="Jane Smith"/></div>
        <div class="fg"><label>Job address</label><input type="text" id="job-addr" placeholder="123 Main St, Belleville ON"/></div>
      </div>
    </div>

    <div class="card">
      <div class="sec-label">Rooms & areas</div>
      <div class="rooms-list" id="rooms-list"><span style="font-size:12px;color:var(--muted)">No rooms added yet</span></div>
      <div class="room-row">
        <div class="fg">
          <label>Room type</label>
          <select id="room-type">
            <option value="">Select room...</option>
            <option>Kitchen</option><option>Bathroom</option><option>Living room</option>
            <option>Bedroom</option><option>Garage</option><option>Workshop</option>
            <option>Basement</option><option>Outdoor / exterior</option><option>Panel / utility room</option>
          </select>
        </div>
        <div class="fg" style="max-width:110px">
          <label>Sq ft</label>
          <input type="number" id="room-sqft" placeholder="e.g. 180" min="0"/>
        </div>
        <button class="btn btn-sm" onclick="addRoom()" style="margin-bottom:1px"><i class="ti ti-plus"></i> Add</button>
      </div>
    </div>

    <div class="card">
      <div class="sec-label">Describe the job</div>
      <div class="fg" style="margin-bottom:12px">
        <textarea id="job-desc" placeholder="e.g. Full kitchen reno — counter receptacles, under-cabinet lighting, dedicated fridge and microwave circuits, new range hood wiring. Also 200A panel upgrade in utility room."></textarea>
      </div>
      <button class="btn btn-black" onclick="startAI()" id="analyze-btn">
        <i class="ti ti-sparkles"></i> Analyze &amp; build assessment
      </button>
    </div>

    <div id="ai-area"></div>
  </div>

  <!-- LINE ITEMS TAB -->
  <div id="tab-items" class="panel">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="sec-label" style="margin:0">Line items</div>
        <span id="item-count" style="font-size:12px;color:var(--muted)"></span>
      </div>
      <div class="items-head">
        <span>Description</span><span>Category</span><span>Qty</span><span>Unit price</span><span></span>
      </div>
      <div id="line-items-list"></div>
      <button class="add-btn" onclick="addManualItem()"><i class="ti ti-plus"></i> Add item manually</button>
      <div class="totals">
        <div class="totals-inner">
          <div class="t-row"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
          <div class="t-row"><span>HST (13%)</span><span id="tax">$0.00</span></div>
          <div class="t-grand"><span>Total</span><span id="grand-total">$0.00</span></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="sec-label" style="margin-bottom:8px">Terms & notes</div>
      <div class="fg">
        <textarea id="terms-text" style="min-height:64px">Payment due within 30 days of invoice. This estimate is valid for 30 days from date of issue. All work performed to CSA and ESA standards. Permit costs included where noted.</textarea>
      </div>
    </div>
    <div class="action-bar">
      <button class="btn btn-black" onclick="window.print()"><i class="ti ti-printer"></i> Print / save PDF</button>
      <button class="btn" onclick="clearEstimate()"><i class="ti ti-trash"></i> Clear assessment</button>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const TAX=0.13;
let rooms=[],lineItems=[];

function getApiKey(){return localStorage.getItem('dwe_api_key')||'';}
function saveKey(){
  const k=document.getElementById('api-key-input').value.trim();
  if(!k){showToast('Please enter a valid API key.');return;}
  localStorage.setItem('dwe_api_key',k);
  document.getElementById('api-banner').style.display='none';
  showToast('API key saved ✓');
}

function showToast(msg,duration=3000){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),duration);
}

window.addEventListener('DOMContentLoaded',()=>{
  if(getApiKey())document.getElementById('api-banner').style.display='none';
  document.getElementById('est-date').value=new Date().toISOString().split('T')[0];
  renderRooms();
});

function switchTab(t,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(btn)btn.classList.add('active');
  if(t==='items')renderLineItems();
}
function switchTabDirect(t){
  const map={'build':0,'items':1};
  document.querySelectorAll('.tab').forEach((b,i)=>{if(i===map[t])b.classList.add('active');else b.classList.remove('active');});
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='items')renderLineItems();
}

function addRoom(){
  const type=document.getElementById('room-type').value;
  const sqft=document.getElementById('room-sqft').value;
  if(!type)return;
  rooms.push({type,sqft:sqft||'?'});
  document.getElementById('room-type').value='';
  document.getElementById('room-sqft').value='';
  renderRooms();
}
function removeRoom(i){rooms.splice(i,1);renderRooms();}
function renderRooms(){
  const el=document.getElementById('rooms-list');
  if(!rooms.length){el.innerHTML='<span style="font-size:12px;color:var(--muted)">No rooms added yet</span>';return;}
  el.innerHTML=rooms.map((r,i)=>`<span class="room-tag">${r.type} · ${r.sqft} sq ft<button onclick="removeRoom(${i})" aria-label="Remove">×</button></span>`).join('');
}

async function startAI(){
  const key=getApiKey();
  if(!key){document.getElementById('api-banner').style.display='flex';showToast('Enter your API key first.');return;}
  const desc=document.getElementById('job-desc').value.trim();
  if(!desc&&rooms.length===0){showToast('Add a room or describe the job first.');return;}
  const btn=document.getElementById('analyze-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Analyzing...';
  const area=document.getElementById('ai-area');
  area.innerHTML=`<div class="ai-box thinking"><div class="ai-label blue"><span class="spinner"></span> Reading job description</div><div class="ai-msg">Applying Ontario Electrical Code rules and building your assessment…</div></div>`;
  const roomSummary=rooms.map(r=>`${r.type} (${r.sqft} sq ft)`).join(', ');
  const prompt=`You are an expert Ontario licensed electrician estimating assistant for DW Electric, a professional electrical and lighting design company in Ontario, Canada.

Rooms: ${roomSummary||'Not specified'}
Job description: ${desc||'Not specified'}

Return ONLY valid JSON (no markdown, no explanation):
{
  "clarifications": [{"id":"c1","question":"Question text","options":["Option A","Option B"]}],
  "ready_items": [{"desc":"Item description","cat":"labour","qty":10,"price":95,"code_note":"OEC ref if applicable"}],
  "summary": "One sentence summary"
}

Rules:
- Max 3 clarification questions, only where answer meaningfully changes scope
- Kitchen: OEC 26-712 counter receptacle spacing (1 per 900mm), GFCI within 1.5m of sink, dedicated 20A for fridge/microwave/dishwasher
- Bathroom: OEC 26-710 GFCI on all receptacles, min 1 dedicated 20A circuit
- Garage/workshop: OEC 26-724 GFCI on all receptacles
- Panel upgrades: always include ESA permit ($150)
- Electrician labour $95/hr, apprentice $65/hr
- Add code_note only where OEC drives the requirement`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    window._aiResult=parsed;window._pendingClarify={};
    renderAIResult(parsed);
  }catch(e){
    area.innerHTML=`<div class="ai-box" style="border-color:#ffaaaa;background:var(--red-light)"><div class="ai-msg" style="color:var(--red)"><i class="ti ti-alert-circle"></i> Error: ${e.message}. Check your API key and try again.</div></div>`;
  }
  btn.disabled=false;btn.innerHTML='<i class="ti ti-sparkles"></i> Analyze &amp; build assessment';
}

function renderAIResult(parsed){
  const area=document.getElementById('ai-area');
  let html=`<div class="ai-box thinking"><div class="ai-label blue"><i class="ti ti-check"></i> Job understood</div><div class="ai-msg">${parsed.summary||''}</div></div>`;
  if(parsed.clarifications&&parsed.clarifications.length>0){
    html+=`<div class="ai-box clarify"><div class="ai-label amber"><i class="ti ti-help-circle"></i> A few quick questions before I build the assessment</div>`;
    parsed.clarifications.forEach(q=>{
      html+=`<div class="clarify-q"><p>${q.question}</p>`;
      if(q.options&&q.options.length){html+=`<div class="options">`;q.options.forEach(opt=>{html+=`<button onclick="pickClarify('${q.id}',this,'${opt.replace(/'/g,"\\'")}'">${opt}</button>`;});html+=`</div>`;}
      html+=`</div>`;
    });
    html+=`<button class="btn btn-black" style="margin-top:10px" onclick="confirmAndBuild()"><i class="ti ti-arrow-right"></i> Build assessment with these answers</button></div>`;
  } else {
    applyItems(parsed.ready_items||[]);
    html+=`<div style="margin-top:0.5rem"><button class="btn btn-blue" onclick="switchTabDirect('items')"><i class="ti ti-list"></i> View line items →</button></div>`;
  }
  area.innerHTML=html;
}

function pickClarify(id,btn,val){
  btn.closest('.options').querySelectorAll('button').forEach(b=>b.classList.remove('picked'));
  btn.classList.add('picked');
  window._pendingClarify=window._pendingClarify||{};
  window._pendingClarify[id]=val;
}

function confirmAndBuild(){
  const parsed=window._aiResult;
  applyItems(parsed.ready_items||[]);
  document.getElementById('ai-area').innerHTML+=`<div class="ai-box success" style="margin-top:1rem"><div class="ai-label green"><i class="ti ti-check"></i> Assessment built</div><div class="ai-msg">Line items generated. Switch to the Line Items tab to review and adjust pricing.</div></div><div style="margin-top:0.75rem"><button class="btn btn-blue" onclick="switchTabDirect('items')"><i class="ti ti-list"></i> View line items →</button></div>`;
}

function applyItems(items){
  items.forEach(i=>lineItems.push({id:Date.now()+Math.random(),desc:i.desc,cat:i.cat||'material',qty:i.qty||1,price:i.price||0,codeNote:i.code_note||''}));
}

function addManualItem(){lineItems.push({id:Date.now(),desc:'',cat:'material',qty:1,price:0,codeNote:''});renderLineItems();}
function removeLineItem(id){lineItems=lineItems.filter(i=>i.id!==id);renderLineItems();}
function updateLine(id,field,value){const i=lineItems.find(x=>x.id===id);if(i){i[field]=(field==='qty'||field==='price')?parseFloat(value)||0:value;updateTotals();}}

function renderLineItems(){
  const c=document.getElementById('line-items-list');if(!c)return;
  c.innerHTML='';
  lineItems.forEach(item=>{
    const row=document.createElement('div');row.className='line-row';
    row.innerHTML=`<div class="line-desc"><input type="text" placeholder="Description" value="${item.desc.replace(/"/g,'&quot;')}" oninput="updateLine(${item.id},'desc',this.value)"/>${item.codeNote?`<span class="code-note">${item.codeNote}</span>`:''}</div><select onchange="updateLine(${item.id},'cat',this.value)"><option value="labour" ${item.cat==='labour'?'selected':''}>Labour</option><option value="material" ${item.cat==='material'?'selected':''}>Material</option><option value="permit" ${item.cat==='permit'?'selected':''}>Permit</option><option value="other" ${item.cat==='other'?'selected':''}>Other</option></select><input type="number" min="0" step="0.5" value="${item.qty}" oninput="updateLine(${item.id},'qty',this.value)"/><input type="number" min="0" step="0.01" value="${item.price}" oninput="updateLine(${item.id},'price',this.value)" placeholder="0.00"/><button class="del-btn" onclick="removeLineItem(${item.id})" aria-label="Remove"><i class="ti ti-trash"></i></button>`;
    c.appendChild(row);
  });
  updateTotals();
  const cnt=document.getElementById('item-count');
  if(cnt)cnt.textContent=lineItems.length+' item'+(lineItems.length!==1?'s':'');
}

function updateTotals(){
  const sub=lineItems.reduce((s,i)=>s+(i.qty*i.price),0);
  const tax=sub*TAX;
  const s=document.getElementById('subtotal'),t=document.getElementById('tax'),g=document.getElementById('grand-total');
  if(s)s.textContent='$'+sub.toFixed(2);
  if(t)t.textContent='$'+tax.toFixed(2);
  if(g)g.textContent='$'+(sub+tax).toFixed(2);
}

function clearEstimate(){if(confirm('Clear all line items?')){lineItems=[];renderLineItems();}}
</script>
</body>
</html>
