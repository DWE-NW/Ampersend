<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Developments — Ampersend</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
  <style>
    :root{
      --black:#1a1a1a;--blue:#1a6eff;--blue-light:rgba(26,110,255,0.08);
      --white:#fff;--surface:#f5f5f7;--border:rgba(0,0,0,0.1);
      --muted:#888;--red:#dc3545;--green:#1e7e34;--amber:#BA7517;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--black);background:var(--surface);}
    nav{height:48px;background:var(--white);border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:200;}
    .logo{font-size:16px;font-weight:600;letter-spacing:-0.03em;color:var(--black);text-decoration:none;}
    .logo span{color:var(--blue);}
    .nav-sep{width:0.5px;height:18px;background:var(--border);}
    .nav-label{font-size:13px;font-weight:500;}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
    .nbtn{padding:6px 12px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--white);color:var(--black);display:flex;align-items:center;gap:5px;font-family:inherit;text-decoration:none;white-space:nowrap;}
    .nbtn.primary{background:var(--black);color:#fff;border-color:var(--black);}
    .nbtn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
    .nbtn:hover:not(.active):not(.primary){background:var(--surface);}
    .nbtn.primary:hover{background:#333;}
    .nbtn:disabled{opacity:0.4;cursor:not-allowed;}

    /* ══ INDEX VIEW ══════════════════════════════════════════ */
    #index-view{display:none;padding:28px 24px;max-width:960px;margin:0 auto;}
    .page-title{font-size:20px;font-weight:700;letter-spacing:-0.02em;margin-bottom:24px;}
    .dev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
    .dev-card{background:var(--white);border:0.5px solid var(--border);border-radius:8px;padding:18px;transition:box-shadow 0.15s;}
    .dev-card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.08);}
    .dev-card-name{font-size:15px;font-weight:700;letter-spacing:-0.01em;margin-bottom:2px;}
    .dev-card-meta{font-size:12px;color:var(--muted);margin-bottom:14px;}
    .dev-card-sites{display:flex;flex-direction:column;gap:6px;}
    .dev-site-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface);border-radius:5px;cursor:pointer;}
    .dev-site-row:hover{background:#e8e8e8;}
    .dev-site-name{font-size:12px;font-weight:500;flex:1;}
    .dev-site-stats{font-size:11px;color:var(--muted);}
    .dev-site-prog{width:60px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0;}
    .dev-site-prog-fill{height:3px;background:var(--blue);border-radius:2px;}
    .dev-card-footer{margin-top:12px;padding-top:10px;border-top:0.5px solid var(--border);display:flex;gap:16px;}
    .dev-stat .n{font-size:18px;font-weight:700;}
    .dev-stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
    .empty-index{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px;line-height:1.8;}
    .empty-index i{font-size:40px;display:block;margin-bottom:12px;opacity:0.3;}
    .no-sites{font-size:12px;color:var(--muted);padding:4px 0;}

    /* ══ SITE VIEW ═══════════════════════════════════════════ */
    #site-view{display:none;height:calc(100vh - 48px);flex-direction:column;}
    .site-body{display:flex;flex:1;overflow:hidden;}

    /* Sidebar */
    .sidebar{width:240px;flex-shrink:0;background:var(--white);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
    .sbh{padding:12px 14px 10px;border-bottom:0.5px solid var(--border);}
    .sbl{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
    .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
    .sc2{background:var(--surface);border-radius:5px;padding:7px 9px;}
    .sc2 .n{font-size:17px;font-weight:700;}
    .sc2 .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin-top:1px;}
    .sc2.done .n{color:var(--green);}
    .lot-list{flex:1;overflow-y:auto;}
    .lot-item{padding:9px 14px;border-bottom:0.5px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:9px;}
    .lot-item:hover{background:var(--surface);}
    .lot-item.sel{background:var(--blue-light);}
    .lot-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
    .lot-info{flex:1;min-width:0;}
    .lot-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .lot-stage{font-size:11px;color:var(--muted);margin-top:1px;}
    .lot-prog{height:2px;background:var(--border);border-radius:1px;margin-top:4px;overflow:hidden;}
    .lot-prog-fill{height:2px;background:var(--blue);border-radius:1px;}
    .empty-lots{padding:24px 14px;text-align:center;color:var(--muted);font-size:12px;line-height:1.7;}

    /* Toolbar */
    .toolbar{height:44px;background:var(--white);border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:6px;flex-shrink:0;overflow-x:auto;}
    .tb-sep{width:0.5px;height:20px;background:var(--border);margin:0 3px;flex-shrink:0;}
    .tb-label{font-size:10px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);flex-shrink:0;}
    .tool-btn{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--white);color:var(--muted);font-family:inherit;display:flex;align-items:center;gap:4px;white-space:nowrap;}
    .tool-btn:hover{background:var(--surface);color:var(--black);}
    .tool-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
    .tool-btn.street.active{background:#444;border-color:#444;}
    .tool-btn.green.active{background:var(--green);border-color:var(--green);}
    .tool-btn.water.active{background:#1a8cff;border-color:#1a8cff;}
    .snap-toggle{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap;}
    .ref-toggle{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap;}

    /* Canvas */
    .canvas-wrap{flex:1;overflow:hidden;position:relative;background:#e8e8e8;}
    .canvas-outer{position:absolute;transform-origin:top left;}
    #plan-canvas{display:block;cursor:crosshair;}
    #plan-canvas.sel-mode{cursor:default;}
    #plan-canvas.grabbing{cursor:grabbing;}

    /* Right panel */
    .rpanel{position:absolute;right:0;top:0;bottom:0;width:230px;background:var(--white);border-left:0.5px solid var(--border);transform:translateX(100%);transition:transform 0.2s;display:flex;flex-direction:column;z-index:50;}
    .rpanel.open{transform:translateX(0);}
    .rph{padding:11px 13px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .rph-t{font-size:13px;font-weight:600;}
    .rph-x{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px;line-height:1;}
    .rpb{flex:1;overflow-y:auto;padding:13px;}
    .rpf{margin-bottom:11px;}
    .rpl{font-size:10px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
    .rpv{font-size:12px;}
    .rpa{padding:11px 13px;border-top:0.5px solid var(--border);display:flex;flex-direction:column;gap:7px;}
    .rpbtn{width:100%;padding:7px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--white);color:var(--black);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;}
    .rpbtn.danger{color:var(--red);border-color:var(--red);}
    .stage-row{display:flex;flex-direction:column;gap:3px;}
    .stage-btn{padding:5px 9px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--white);color:var(--muted);font-family:inherit;text-align:left;display:flex;align-items:center;gap:5px;}
    .stage-btn.active-s{background:var(--blue);color:#fff;border-color:var(--blue);}
    .stage-btn.done-s{background:var(--surface);color:var(--black);}

    /* Shape edit inline panel */
    .shape-props{position:absolute;background:var(--white);border:0.5px solid var(--border);border-radius:6px;box-shadow:0 4px 20px rgba(0,0,0,0.12);padding:12px;z-index:100;min-width:200px;display:none;}
    .shape-props.show{display:block;}
    .sp-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
    .sp-label{font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);}
    .sp-input{font-size:13px;padding:6px 9px;border:0.5px solid var(--border);border-radius:4px;font-family:inherit;width:100%;}
    .sp-select{font-size:13px;padding:6px 9px;border:0.5px solid var(--border);border-radius:4px;font-family:inherit;width:100%;background:var(--white);}
    .sp-actions{display:flex;gap:6px;}
    .sp-btn{flex:1;padding:6px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);font-family:inherit;}
    .sp-btn.primary{background:var(--black);color:#fff;border-color:var(--black);}
    .sp-btn.danger{color:var(--red);border-color:var(--red);background:var(--white);}

    /* Modals */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;display:none;align-items:center;justify-content:center;}
    .overlay.open{display:flex;}
    .modal{background:var(--white);border-radius:8px;width:480px;max-width:94vw;max-height:90vh;overflow:auto;box-shadow:0 8px 40px rgba(0,0,0,0.2);}
    .mh{padding:15px 20px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .mh-t{font-size:15px;font-weight:600;}
    .mh-x{background:none;border:none;cursor:pointer;color:var(--muted);font-size:22px;line-height:1;}
    .mb{padding:18px 20px;display:flex;flex-direction:column;gap:13px;}
    .mf{padding:13px 20px;border-top:0.5px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
    .mbtn{padding:7px 16px;border-radius:4px;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--white);color:var(--black);font-family:inherit;}
    .mbtn.primary{background:var(--black);color:#fff;border-color:var(--black);}
    .fg{display:flex;flex-direction:column;gap:5px;}
    .fg label{font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);}
    .fg input,.fg select,.fg textarea{font-size:13px;padding:8px 10px;border:0.5px solid var(--border);border-radius:4px;background:var(--white);color:var(--black);width:100%;font-family:inherit;}
    .fg textarea{resize:vertical;min-height:60px;}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .upload-area{border:1.5px dashed var(--border);border-radius:6px;padding:24px;text-align:center;cursor:pointer;color:var(--muted);font-size:13px;line-height:1.6;transition:border-color 0.15s;}
    .upload-area:hover,.upload-area.has-file{border-color:var(--blue);color:var(--blue);}
    .upload-area i{font-size:26px;display:block;margin-bottom:6px;opacity:0.5;}
    .stage-list{display:flex;flex-direction:column;gap:5px;}
    .stage-input-row{display:flex;gap:6px;align-items:center;}
    .stage-input-row input{flex:1;font-size:13px;padding:6px 9px;border:0.5px solid var(--border);border-radius:4px;font-family:inherit;}
    .stage-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:3px;}
    .stage-del:hover{color:var(--red);}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--black);color:#fff;padding:8px 18px;border-radius:6px;font-size:13px;opacity:0;transition:all 0.2s;pointer-events:none;z-index:999;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .kbd{background:var(--surface);border:0.5px solid var(--border);border-radius:3px;padding:1px 5px;font-size:10px;font-family:monospace;color:var(--muted);}
  </style>
</head>
<body>

<nav>
  <a class="logo" href="/"><span>dw—</span>electric</a>
  <div class="nav-sep"></div>
  <span class="nav-label" id="nav-label">Developments</span>
  <div class="nav-right" id="nav-right">
    <a class="nbtn" href="/tracker.html"><i class="ti ti-map"></i> Tracker</a>
    <button class="nbtn primary" id="nav-primary-btn" onclick="openNewDev()"><i class="ti ti-plus"></i> New developer</button>
  </div>
</nav>

<!-- ══ INDEX VIEW ══════════════════════════════════════════════ -->
<div id="index-view">
  <div class="page-title">All Developers</div>
  <div class="dev-grid" id="dev-grid"><div style="color:var(--muted);font-size:13px">Loading…</div></div>
</div>

<!-- ══ SITE VIEW ═══════════════════════════════════════════════ -->
<div id="site-view">
  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <span class="tb-label">Draw</span>
    <button class="tool-btn" id="tool-select" onclick="setTool('select')" title="Select & move (V)"><i class="ti ti-pointer"></i> Select</button>
    <button class="tool-btn" id="tool-lot" onclick="setTool('lot')" title="Draw lot (L)"><i class="ti ti-square"></i> Lot</button>
    <button class="tool-btn street" id="tool-street" onclick="setTool('street')" title="Draw street (S)"><i class="ti ti-road"></i> Street</button>
    <button class="tool-btn green" id="tool-green" onclick="setTool('greenspace')" title="Draw green space (G)"><i class="ti ti-trees"></i> Green</button>
    <button class="tool-btn water" id="tool-water" onclick="setTool('water')" title="Draw water (W)"><i class="ti ti-droplet"></i> Water</button>
    <button class="tool-btn" id="tool-poly" onclick="setTool('poly')" title="Polygon (P)"><i class="ti ti-pentagon"></i> Polygon</button>
    <div class="tb-sep"></div>
    <span class="tb-label">Snap</span>
    <select id="snap-size" onchange="SNAP=parseInt(this.value)" style="font-size:11px;padding:3px 6px;border:0.5px solid var(--border);border-radius:4px;font-family:inherit;color:var(--black);">
      <option value="10">10px</option>
      <option value="20" selected>20px</option>
      <option value="40">40px</option>
      <option value="0">Off</option>
    </select>
    <div class="tb-sep"></div>
    <span class="tb-label">Zoom</span>
    <button class="tool-btn" onclick="setZoom(zoom-0.1)"><i class="ti ti-minus"></i></button>
    <button class="tool-btn" onclick="setZoom(zoom+0.1)"><i class="ti ti-plus"></i></button>
    <button class="tool-btn" onclick="fitView()">Fit</button>
    <div class="tb-sep"></div>
    <label class="ref-toggle" title="Show/hide reference image"><input type="checkbox" id="ref-toggle" checked onchange="redraw()"/> Ref</label>
    <div class="tb-sep"></div>
    <button class="tool-btn" onclick="undo()" title="Undo (Ctrl+Z)"><i class="ti ti-arrow-back-up"></i></button>
    <button class="tool-btn" onclick="saveShapes(true)" title="Save plan"><i class="ti ti-device-floppy"></i> Save</button>
  </div>

  <div class="site-body">
    <div class="sidebar">
      <div class="sbh">
        <div class="sbl">Lots</div>
        <div class="stats">
          <div class="sc2"><div class="n" id="st-total">0</div><div class="l">Total</div></div>
          <div class="sc2"><div class="n" id="st-active">0</div><div class="l">Active</div></div>
          <div class="sc2 done"><div class="n" id="st-done">0</div><div class="l">Done</div></div>
        </div>
      </div>
      <div class="lot-list" id="lot-list"></div>
    </div>

    <div style="flex:1;position:relative;display:flex;flex-direction:column;overflow:hidden;">
      <div class="canvas-wrap" id="canvas-wrap">
        <div class="canvas-outer" id="canvas-outer">
          <canvas id="plan-canvas"></canvas>
        </div>
      </div>

      <!-- Shape property popup -->
      <div class="shape-props" id="shape-props">
        <div class="sp-row">
          <div class="sp-label">Label</div>
          <input class="sp-input" id="sp-label" placeholder="e.g. Lot 12 or Elm Street"/>
        </div>
        <div class="sp-row">
          <div class="sp-label">Type</div>
          <select class="sp-select" id="sp-type">
            <option value="lot">Lot</option>
            <option value="street">Street</option>
            <option value="greenspace">Green space</option>
            <option value="water">Water</option>
          </select>
        </div>
        <div class="sp-actions">
          <button class="sp-btn primary" onclick="applyShapeProps()">Apply</button>
          <button class="sp-btn danger" onclick="deleteSelected()">Delete</button>
        </div>
      </div>

      <!-- Lot detail panel -->
      <div class="rpanel" id="rpanel">
        <div class="rph"><span class="rph-t" id="rp-title">Lot</span><button class="rph-x" onclick="closeDetail()">×</button></div>
        <div class="rpb" id="rp-body"></div>
        <div class="rpa">
          <button class="rpbtn" onclick="editLotOpen()"><i class="ti ti-edit"></i> Edit lot</button>
          <button class="rpbtn danger" onclick="deleteLotData()"><i class="ti ti-trash"></i> Remove lot data</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- NEW DEVELOPER MODAL -->
<div class="overlay" id="new-dev-overlay">
  <div class="modal">
    <div class="mh"><span class="mh-t">New developer</span><button class="mh-x" onclick="closeNewDev()">×</button></div>
    <div class="mb">
      <div class="fg"><label>Company / Developer name</label><input id="nd-name" placeholder="Tricar Group"/></div>
      <div class="g2">
        <div class="fg"><label>Phone</label><input id="nd-phone" placeholder="(705) 555-0100"/></div>
        <div class="fg"><label>Email</label><input id="nd-email" type="email" placeholder="contact@developer.ca"/></div>
      </div>
      <div class="fg"><label>Address</label><input id="nd-address" placeholder="123 Main St, Peterborough ON"/></div>
      <div class="fg"><label>Notes</label><textarea id="nd-notes"></textarea></div>
    </div>
    <div class="mf">
      <button class="mbtn" onclick="closeNewDev()">Cancel</button>
      <button class="mbtn primary" onclick="saveNewDev()"><i class="ti ti-check"></i> Create developer</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="settings-overlay">
  <div class="modal">
    <div class="mh"><span class="mh-t">Development settings</span><button class="mh-x" onclick="closeSettings()">×</button></div>
    <div class="mb">
      <div class="g2">
        <div class="fg"><label>Title</label><input id="s-title"/></div>
        <div class="fg"><label>Developer</label><select id="s-developer-id"></select></div>
      </div>
      <div class="fg"><label>Reference image (optional)</label>
        <div class="upload-area" id="upload-area" onclick="document.getElementById('ref-file').click()">
          <i class="ti ti-photo-up"></i>Upload reference image (PNG/JPG) — shown faintly underneath
        </div>
        <input type="file" id="ref-file" accept="image/png,image/jpeg" style="display:none" onchange="handleRefUpload(this)"/>
      </div>
      <div class="fg">
        <label>Canvas size</label>
        <div class="g2">
          <div class="fg"><label>Width (px)</label><input id="s-cw" type="number" placeholder="1600"/></div>
          <div class="fg"><label>Height (px)</label><input id="s-ch" type="number" placeholder="1200"/></div>
        </div>
      </div>
      <div class="fg">
        <label>Project stages</label>
        <div class="stage-list" id="stage-list"></div>
        <button class="nbtn" style="margin-top:6px;font-size:11px" onclick="addStageInput()"><i class="ti ti-plus"></i> Add stage</button>
      </div>
    </div>
    <div class="mf">
      <button class="mbtn" onclick="closeSettings()">Cancel</button>
      <button class="mbtn primary" onclick="saveSettings()"><i class="ti ti-check"></i> Save</button>
    </div>
  </div>
</div>

<!-- LOT DATA MODAL -->
<div class="overlay" id="lot-overlay">
  <div class="modal">
    <div class="mh"><span class="mh-t" id="lot-modal-title">Lot details</span><button class="mh-x" onclick="closeLotModal()">×</button></div>
    <div class="mb">
      <div class="g2">
        <div class="fg"><label>Customer</label><input id="l-customer" placeholder="Jane Smith"/></div>
        <div class="fg"><label>Phone</label><input id="l-phone" placeholder="(705) 555-0100"/></div>
      </div>
      <div class="fg"><label>Email</label><input id="l-email" type="email"/></div>
      <div class="fg"><label>Notes</label><textarea id="l-notes"></textarea></div>
      <div class="fg"><label>Stage</label><select id="l-stage"></select></div>
    </div>
    <div class="mf">
      <button class="mbtn" onclick="closeLotModal()">Cancel</button>
      <button class="mbtn primary" onclick="saveLotData()"><i class="ti ti-check"></i> Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

  const isW=opts.method&&opts.method!=='GET';
  const r=await fetch(`${SB_URL}/rest/v1/${path}`,{
    headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json',

function renderIndex(devs,sites){
  const grid=document.getElementById('dev-grid');
  if(!devs.length){grid.innerHTML=`<div class="empty-index"><i class="ti ti-building-community"></i>No developers yet.<br>Click <strong>New developer</strong> to get started.</div>`;return;}
  grid.innerHTML=devs.map(dev=>{
    const s=sites.filter(x=>x.developer_id===dev.id);
    const tl=s.reduce((a,x)=>a+safeJson(x.lots,[]).length,0);
    const dn=s.reduce((a,x)=>a+safeJson(x.lots,[]).filter(l=>(l.stage||0)>=4).length,0);
    const rows=s.map(x=>{
      const lots=safeJson(x.lots,[]),done=lots.filter(l=>(l.stage||0)>=4).length,pct=lots.length?Math.round(done/lots.length*100):0;
      return`<div class="dev-site-row" onclick="location.href='/development.html?id=${x.id}'">
        <span class="dev-site-name">${esc(x.title||'Unnamed')}</span>
        <span class="dev-site-stats">${lots.length} lots</span>
        <div class="dev-site-prog"><div class="dev-site-prog-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('')||`<div class="no-sites">No developments yet</div>`;
    return`<div class="dev-card">
      <div class="dev-card-name">${esc(dev.name)}</div>
      <div class="dev-card-meta">${[dev.phone,dev.email].filter(Boolean).join(' · ')}</div>

const DEFAULT_STAGES=['Site visit','Rough-in','Inspection','Final'];
const SHAPE_STYLES={
  lot:      {fill:'rgba(255,255,255,0.85)', stroke:'#1a1a1a', strokeW:1.5},
  street:   {fill:'rgba(60,60,60,0.85)',    stroke:'#1a1a1a', strokeW:1},
  greenspace:{fill:'rgba(30,126,52,0.45)',  stroke:'#1a1a1a', strokeW:1},
  water:    {fill:'rgba(26,110,255,0.3)',   stroke:'#1a6eff', strokeW:1},
};
const LOT_COLOURS=['#1a6eff','#BA7517','#1e7e34','#dc3545','#888','#6f42c1'];

let dev=null,allDevs=[];
let shapes=[],lots=[];  // lots = project data keyed by shape id
let selShapeId=null,selLotShapeId=null;
let activeTool='select';
let SNAP=20;
let zoom=1,panX=0,panY=0;
let refImage=null,showRef=true;
let pendingUploadFile=null;
let history=[]; // for undo
let isDragging=false,dragStartX=0,dragStartY=0;
let drawState=null; // for rect/poly drawing
let polyPoints=[];
let CANVAS_W=1600,CANVAS_H=1200;

// canvas
const wrap=document.getElementById('canvas-wrap');
const outer=document.getElementById('canvas-outer');
const canvas=document.getElementById('plan-canvas');
const ctx=canvas.getContext('2d');

// ── DRAWING ───────────────────────────────────────────────────
function snapPt(x,y){
  if(!SNAP)return[x,y];
  return[Math.round(x/SNAP)*SNAP,Math.round(y/SNAP)*SNAP];
}

function canvasXY(e){
  const r=canvas.getBoundingClientRect();
  return[(e.clientX-r.left)*(CANVAS_W/r.width),(e.clientY-r.top)*(CANVAS_H/r.height)];
}

function setTool(t){
  activeTool=t;polyPoints=[];drawState=null;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('tool-'+t);
  if(el)el.classList.add('active');
  canvas.className=t==='select'?'sel-mode':'';
  hideShapeProps();
  redraw();
}

function setupEvents(){
  canvas.addEventListener('mousedown',onDown);
  canvas.addEventListener('mousemove',onMove);
  canvas.addEventListener('mouseup',onUp);
  canvas.addEventListener('dblclick',onDbl);
  canvas.addEventListener('contextmenu',e=>{e.preventDefault();cancelDraw();});

  // pan with middle mouse or space+drag
  let spaceDown=false;
  window.addEventListener('keydown',e=>{if(e.code==='Space'&&!e.target.closest('input,textarea,select')){spaceDown=true;canvas.style.cursor='grab';}});
  window.addEventListener('keyup',e=>{if(e.code==='Space'){spaceDown=false;canvas.style.cursor='';}});

  let panStart=null;
  canvas.addEventListener('mousedown',e=>{if(e.button===1||spaceDown){panStart={x:e.clientX-panX,y:e.clientY-panY};e.preventDefault();}});
  window.addEventListener('mousemove',e=>{if(panStart){panX=e.clientX-panStart.x;panY=e.clientY-panStart.y;applyTransform();}});
  window.addEventListener('mouseup',()=>panStart=null);

  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    const prev=zoom;zoom=Math.max(0.1,Math.min(5,zoom+(e.deltaY<0?0.08:-0.08)));
    const r=wrap.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
    panX=mx-(mx-panX)*(zoom/prev);panY=my-(my-panY)*(zoom/prev);
    applyTransform();
  },{passive:false});
}

function setupKeys(){
  window.addEventListener('keydown',e=>{
    if(e.target.closest('input,textarea,select'))return;
    if(e.key==='v'||e.key==='V')setTool('select');
    if(e.key==='l'||e.key==='L')setTool('lot');
    if(e.key==='s'||e.key==='S')setTool('street');
    if(e.key==='g'||e.key==='G')setTool('greenspace');
    if(e.key==='w'||e.key==='W')setTool('water');
    if(e.key==='p'||e.key==='P')setTool('poly');
    if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}
    if(e.key==='Escape'){cancelDraw();selShapeId=null;hideShapeProps();redraw();}
    if(e.key==='Delete'||e.key==='Backspace'){if(selShapeId&&!e.target.closest('input,textarea'))deleteSelected();}
  });
}

let mouseDownPt=null;
function onDown(e){
  if(e.button!==0)return;
  const[cx,cy]=canvasXY(e);
  const[sx,sy]=snapPt(cx,cy);

  if(activeTool==='select'){
    const hit=hitTest(cx,cy);
    if(hit){
      selShapeId=hit.id;
      isDragging=true;dragStartX=cx;dragStartY=cy;
      // check handle hit
      const hh=hitHandle(hit,cx,cy);
      if(hh!==null){isDragging='handle';dragHandle=hh;}
      else{isDragging='move';}
      // show lot detail if lot shape
      if(hit.type==='lot'){const ld=lots.find(l=>l.shapeId===hit.id);if(ld)showLotDetail(hit.id);}
      showShapeProps(hit,e);
    } else {
      selShapeId=null;hideShapeProps();closeDetail();
    }
    redraw();return;
  }

  if(activeTool==='poly'){
    polyPoints.push([sx,sy]);redraw();return;
  }

  // rect tools
  mouseDownPt=[sx,sy];
  drawState={x0:sx,y0:sy,x1:sx,y1:sy,type:activeTool};
}

let dragHandle=null,dragShapeBackup=null;
function onMove(e){
  const[cx,cy]=canvasXY(e);
  const[sx,sy]=snapPt(cx,cy);

  if(activeTool==='poly'){redraw();drawPolyPreview(cx,cy);return;}

  if(mouseDownPt&&drawState){
    drawState.x1=sx;drawState.y1=sy;redraw();drawRectPreview();return;
  }

  if(isDragging&&selShapeId){
    const shape=shapes.find(s=>s.id===selShapeId);if(!shape)return;
    const dx=cx-dragStartX,dy=cy-dragStartY;
    if(isDragging==='move'){
      if(!dragShapeBackup)dragShapeBackup=JSON.parse(JSON.stringify(shape.points));
      shape.points=dragShapeBackup.map(([px,py])=>snapPt(px+dx,py+dy));
    } else if(isDragging==='handle'){
      if(!dragShapeBackup)dragShapeBackup=JSON.parse(JSON.stringify(shape.points));
      const newPts=[...dragShapeBackup];
      newPts[dragHandle]=snapPt(dragShapeBackup[dragHandle][0]+dx,dragShapeBackup[dragHandle][1]+dy);
      shape.points=newPts;
    }
    redraw();
  }
}

function onUp(e){
  if(mouseDownPt&&drawState&&activeTool!=='select'&&activeTool!=='poly'){
    const[sx,sy]=snapPt(...canvasXY(e));
    const x0=Math.min(drawState.x0,sx),y0=Math.min(drawState.y0,sy);
    const x1=Math.max(drawState.x0,sx),y1=Math.max(drawState.y0,sy);
    if(Math.abs(x1-x0)>5&&Math.abs(y1-y0)>5){
      pushHistory();
      const shape={id:uid(),type:activeTool,points:[[x0,y0],[x1,y0],[x1,y1],[x0,y1]],label:''};
      shapes.push(shape);selShapeId=shape.id;
      showShapePropsAt(shape,e.clientX,e.clientY);
    }
    mouseDownPt=null;drawState=null;redraw();
  }
  if(isDragging){dragShapeBackup=null;isDragging=false;dragHandle=null;}
  mouseDownPt=null;
}

function onDbl(e){
  if(activeTool==='poly'&&polyPoints.length>=3){
    pushHistory();
    const shape={id:uid(),type:'lot',points:[...polyPoints],label:''};
    shapes.push(shape);selShapeId=shape.id;polyPoints=[];
    showShapePropsAt(shape,e.clientX,e.clientY);
    redraw();
  }
}

function cancelDraw(){polyPoints=[];mouseDownPt=null;drawState=null;redraw();}

// ── HIT TESTING ───────────────────────────────────────────────
function hitTest(cx,cy){
  for(let i=shapes.length-1;i>=0;i--){
    if(pointInPoly(cx,cy,shapes[i].points))return shapes[i];
  }return null;
}
function pointInPoly(x,y,pts){
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const[xi,yi]=pts[i],[xj,yj]=pts[j];
    if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi))inside=!inside;
  }return inside;
}
function hitHandle(shape,cx,cy){
  const r=8/zoom;
  for(let i=0;i<shape.points.length;i++){
    const[px,py]=shape.points[i];
    if(Math.abs(cx-px)<r&&Math.abs(cy-py)<r)return i;
  }return null;
}

// ── REDRAW ────────────────────────────────────────────────────
function redraw(){
  ctx.clearRect(0,0,CANVAS_W,CANVAS_H);
  // Background
  ctx.fillStyle='#f8f8f8';ctx.fillRect(0,0,CANVAS_W,CANVAS_H);

  // Snap grid (dots)
  if(SNAP>0){
    ctx.fillStyle='rgba(0,0,0,0.12)';
    for(let x=0;x<=CANVAS_W;x+=SNAP)for(let y=0;y<=CANVAS_H;y+=SNAP){ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fill();}
  }

  // Reference image
  if(refImage&&document.getElementById('ref-toggle').checked){
    ctx.globalAlpha=0.3;ctx.drawImage(refImage,0,0,CANVAS_W,CANVAS_H);ctx.globalAlpha=1;
  }

  // Draw shapes (non-lots first, then lots on top)
  const nonLots=shapes.filter(s=>s.type!=='lot');
  const lotShapes=shapes.filter(s=>s.type==='lot');
  [...nonLots,...lotShapes].forEach(s=>drawShape(s));

  // Poly preview
  if(activeTool==='poly'&&polyPoints.length){
    ctx.strokeStyle=getStyle('lot').stroke;ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    ctx.beginPath();polyPoints.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));ctx.stroke();
    ctx.setLineDash([]);
    polyPoints.forEach(([x,y])=>{ctx.fillStyle='#1a6eff';ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();});
  }
}

function getStyle(type){return SHAPE_STYLES[type]||SHAPE_STYLES.lot;}

function drawShape(s){
  const st=getStyle(s.type);
  const pts=s.points;if(!pts||pts.length<2)return;
  const isSel=s.id===selShapeId;

  // Fill
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.closePath();

  // If lot — check if has project data and colour by stage
  if(s.type==='lot'){
    const ld=lots.find(l=>l.shapeId===s.id);
    if(ld&&(ld.stage||0)>0){
      const stages=dev?.stages||DEFAULT_STAGES;
      const done=ld.stage||0;
      const col=done>=stages.length?'rgba(30,126,52,0.5)':hexAlpha(LOT_COLOURS[(done-1)%LOT_COLOURS.length],0.4);
      ctx.fillStyle=col;
    } else {ctx.fillStyle=st.fill;}
  } else {ctx.fillStyle=st.fill;}
  ctx.fill();

  // Stroke
  ctx.strokeStyle=isSel?'#1a6eff':st.stroke;
  ctx.lineWidth=isSel?2.5:st.strokeW;
  ctx.stroke();

  // Label
  if(s.label){
    const bounds=polyBounds(pts);
    const cx=bounds.cx,cy=bounds.cy;
    const fs=Math.max(9,Math.min(14,bounds.w*0.18,bounds.h*0.3));
    ctx.fillStyle=s.type==='street'?'rgba(255,255,255,0.7)':'#1a1a1a';
    ctx.font=`500 ${fs}px -apple-system,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(s.label,cx,cy);
  }

  // Handles if selected
  if(isSel){
    pts.forEach(([x,y])=>{
      ctx.fillStyle='#fff';ctx.strokeStyle='#1a6eff';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();ctx.stroke();
    });
  }
}

function drawRectPreview(){
  if(!drawState)return;
  const{x0,y0,x1,y1,type}=drawState;
  const st=getStyle(type);
  ctx.fillStyle=st.fill;ctx.strokeStyle='#1a6eff';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.rect(Math.min(x0,x1),Math.min(y0,y1),Math.abs(x1-x0),Math.abs(y1-y0));
  ctx.fill();ctx.stroke();ctx.setLineDash([]);
}

function drawPolyPreview(mx,my){
  if(!polyPoints.length)return;
  ctx.strokeStyle='#1a6eff';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(polyPoints[polyPoints.length-1][0],polyPoints[polyPoints.length-1][1]);
  ctx.lineTo(mx,my);ctx.stroke();ctx.setLineDash([]);
}

function polyBounds(pts){
  const xs=pts.map(p=>p[0]),ys=pts.map(p=>p[1]);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  return{cx:(minX+maxX)/2,cy:(minY+maxY)/2,w:maxX-minX,h:maxY-minY};
}
function hexAlpha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}

// ── SHAPE PROPS POPUP ─────────────────────────────────────────
function showShapeProps(shape,e){
  showShapePropsAt(shape,e?e.clientX:null,e?e.clientY:null);
}
function showShapePropsAt(shape,clientX,clientY){
  const pp=document.getElementById('shape-props');
  document.getElementById('sp-label').value=shape.label||'';
  document.getElementById('sp-type').value=shape.type||'lot';
  pp.classList.add('show');
  if(clientX!=null){
    const wrapR=wrap.getBoundingClientRect();
    let left=clientX-wrapR.left+10,top=clientY-wrapR.top+10;
    if(left+220>wrapR.width)left=clientX-wrapR.left-230;
    if(top+160>wrapR.height)top=clientY-wrapR.top-160;
    pp.style.left=left+'px';pp.style.top=top+'px';
  }
}
function hideShapeProps(){document.getElementById('shape-props').classList.remove('show');}
function applyShapeProps(){
  const shape=shapes.find(s=>s.id===selShapeId);if(!shape)return;
  pushHistory();
  shape.label=document.getElementById('sp-label').value.trim();
  shape.type=document.getElementById('sp-type').value;
  hideShapeProps();redraw();renderStats();renderLotList();
}
function deleteSelected(){
  if(!selShapeId)return;pushHistory();
  shapes=shapes.filter(s=>s.id!==selShapeId);
  lots=lots.filter(l=>l.shapeId!==selShapeId);
  selShapeId=null;hideShapeProps();closeDetail();redraw();renderStats();renderLotList();
}

// ── LOT DATA ──────────────────────────────────────────────────
let editingLotShapeId=null;

function showLotDetail(shapeId){
  selLotShapeId=shapeId;
  const shape=shapes.find(s=>s.id===shapeId);
  const ld=lots.find(l=>l.shapeId===shapeId);
  const stages=dev?.stages||DEFAULT_STAGES;
  const done=ld?.stage||0;
  document.getElementById('rp-title').textContent=shape?.label||'Lot';
  const stageRows=stages.map((s,i)=>`
    <button class="stage-btn ${i<done?'done-s':''} ${i===done?'active-s':''}" onclick="setLotStage('${shapeId}',${i+1})">
      <i class="ti ti-${i<done?'check':'circle'}"></i>${esc(s)}
    </button>`).join('');
  document.getElementById('rp-body').innerHTML=`
    ${ld?.customer?`<div class="rpf"><div class="rpl">Customer</div><div class="rpv">${esc(ld.customer)}</div></div>`:''}
    ${ld?.phone?`<div class="rpf"><div class="rpl">Phone</div><div class="rpv">${esc(ld.phone)}</div></div>`:''}
    ${ld?.email?`<div class="rpf"><div class="rpl">Email</div><div class="rpv">${esc(ld.email)}</div></div>`:''}
    ${ld?.notes?`<div class="rpf"><div class="rpl">Notes</div><div class="rpv">${esc(ld.notes)}</div></div>`:''}
    <div class="rpf"><div class="rpl">Stage</div><div class="stage-row">${stageRows}</div></div>`;
  document.getElementById('rpanel').classList.add('open');
}
function closeDetail(){selLotShapeId=null;document.getElementById('rpanel').classList.remove('open');}

async function setLotStage(shapeId,stage){
  let ld=lots.find(l=>l.shapeId===shapeId);
  if(!ld){ld={shapeId};lots.push(ld);}
  ld.stage=stage;
  await saveLots();showLotDetail(shapeId);renderStats();renderLotList();redraw();
}

function editLotOpen(){
  if(!selLotShapeId)return;
  editingLotShapeId=selLotShapeId;
  const ld=lots.find(l=>l.shapeId===selLotShapeId)||{};
  const shape=shapes.find(s=>s.id===selLotShapeId);
  document.getElementById('lot-modal-title').textContent=shape?.label||'Lot details';
  document.getElementById('l-customer').value=ld.customer||'';
  document.getElementById('l-phone').value=ld.phone||'';
  document.getElementById('l-email').value=ld.email||'';
  document.getElementById('l-notes').value=ld.notes||'';
  const stages=dev?.stages||DEFAULT_STAGES;
  document.getElementById('l-stage').innerHTML=stages.map((s,i)=>`<option value="${i}" ${(ld.stage||0)===i?'selected':''}>${s}</option>`).join('');
  document.getElementById('lot-overlay').classList.add('open');
}
function closeLotModal(){document.getElementById('lot-overlay').classList.remove('open');}
async function saveLotData(){
  let ld=lots.find(l=>l.shapeId===editingLotShapeId);
  if(!ld){ld={shapeId:editingLotShapeId};lots.push(ld);}
  ld.customer=document.getElementById('l-customer').value.trim();
  ld.phone=document.getElementById('l-phone').value.trim();
  ld.email=document.getElementById('l-email').value.trim();
  ld.notes=document.getElementById('l-notes').value.trim();
  ld.stage=parseInt(document.getElementById('l-stage').value)||0;
  await saveLots();closeLotModal();showLotDetail(editingLotShapeId);renderStats();renderLotList();redraw();toast('Saved');
}
async function deleteLotData(){
  lots=lots.filter(l=>l.shapeId!==selLotShapeId);
  await saveLots();closeDetail();renderStats();renderLotList();redraw();toast('Removed');
}

// ── SIDEBAR ───────────────────────────────────────────────────
function renderStats(){
  const lotShapes=shapes.filter(s=>s.type==='lot');
  const stages=dev?.stages||DEFAULT_STAGES;
  const done=lotShapes.filter(s=>{const ld=lots.find(l=>l.shapeId===s.id);return ld&&(ld.stage||0)>=stages.length;}).length;
  const active=lotShapes.filter(s=>{const ld=lots.find(l=>l.shapeId===s.id);return ld&&(ld.stage||0)>0&&(ld.stage||0)<stages.length;}).length;
  document.getElementById('st-total').textContent=lotShapes.length;
  document.getElementById('st-active').textContent=active;
  document.getElementById('st-done').textContent=done;
}
function renderLotList(){
  const list=document.getElementById('lot-list');
  const lotShapes=shapes.filter(s=>s.type==='lot');
  if(!lotShapes.length){list.innerHTML='<div class="empty-lots">Draw lot shapes on the canvas.<br>Click a lot to add project details.</div>';return;}
  const stages=dev?.stages||DEFAULT_STAGES;
  list.innerHTML=lotShapes.map(s=>{
    const ld=lots.find(l=>l.shapeId===s.id);
    const done=ld?.stage||0,total=stages.length,pct=Math.round(done/total*100);
    const stageName=done>=total?'Complete':(ld?stages[done]||'Not started':'No data');
    const col=done>=total?'#1e7e34':done>0?LOT_COLOURS[(done-1)%LOT_COLOURS.length]:'#ccc';
    return`<div class="lot-item ${selLotShapeId===s.id?'sel':''}" onclick="selShapeId='${s.id}';showLotDetail('${s.id}');redraw();">
      <div class="lot-dot" style="background:${col}"></div>
      <div class="lot-info">
        <div class="lot-name">${esc(s.label||'Unnamed lot')}</div>
        <div class="lot-stage">${stageName}</div>
        <div class="lot-prog"><div class="lot-prog-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  }).join('');
}

// ── SAVE / LOAD ───────────────────────────────────────────────
async function saveShapes(showToast){
  try{
    await db(`developments?id=eq.${DEV_ID}`,{method:'PATCH',body:JSON.stringify({shapes:JSON.stringify(shapes)})});
    if(showToast)toast('Plan saved ✓');
  }catch(e){toast('Save failed: '+e.message);}
}
async function saveLots(){
  await db(`developments?id=eq.${DEV_ID}`,{method:'PATCH',body:JSON.stringify({lots:JSON.stringify(lots)})});
}

// auto-save shapes every 60s
setInterval(()=>{if(DEV_ID&&shapes.length)saveShapes(false);},60000);

// ── UNDO ──────────────────────────────────────────────────────
function pushHistory(){history.push(JSON.stringify(shapes));if(history.length>40)history.shift();}
function undo(){if(!history.length)return;shapes=JSON.parse(history.pop());selShapeId=null;hideShapeProps();redraw();renderStats();renderLotList();}

// ── PAN / ZOOM ────────────────────────────────────────────────
function setZoom(z){zoom=Math.max(0.1,Math.min(5,z));applyTransform();}
function applyTransform(){outer.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;}
function fitView(){
  const ww=wrap.clientWidth,wh=wrap.clientHeight;
  zoom=Math.min(ww/CANVAS_W,wh/CANVAS_H)*0.92;
  panX=(ww-CANVAS_W*zoom)/2;panY=(wh-CANVAS_H*zoom)/2;
  applyTransform();
}

// ── REFERENCE IMAGE ───────────────────────────────────────────
function loadRef(url){
  const img=new Image();img.crossOrigin='anonymous';
  img.onload=()=>{refImage=img;redraw();};
  img.onerror=()=>toast('Could not load reference image');
  img.src=url;
}
function handleRefUpload(input){
  const file=input.files[0];if(!file)return;pendingUploadFile=file;
  document.getElementById('upload-area').innerHTML=`<i class="ti ti-photo-check"></i>${esc(file.name)} — ready to save`;
  document.getElementById('upload-area').classList.add('has-file');
}

// ── SETTINGS ──────────────────────────────────────────────────
function openSettings(){
  document.getElementById('s-title').value=dev.title||'';
  document.getElementById('s-cw').value=CANVAS_W;
  document.getElementById('s-ch').value=CANVAS_H;
  document.getElementById('s-developer-id').innerHTML=
    `<option value="">— None —</option>`+allDevs.map(d=>`<option value="${d.id}" ${dev.developer_id===d.id?'selected':''}>${esc(d.name)}</option>`).join('');
  if(dev.site_plan_url){document.getElementById('upload-area').innerHTML=`<i class="ti ti-photo-check"></i>Reference image uploaded — click to replace`;document.getElementById('upload-area').classList.add('has-file');}
  renderStageInputs();
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings(){document.getElementById('settings-overlay').classList.remove('open');pendingUploadFile=null;}
function renderStageInputs(){
  document.getElementById('stage-list').innerHTML=(dev.stages||DEFAULT_STAGES).map((s,i)=>`
    <div class="stage-input-row">
      <input value="${esc(s)}" oninput="dev.stages[${i}]=this.value"/>
      <button class="stage-del" onclick="dev.stages.splice(${i},1);renderStageInputs()"><i class="ti ti-x"></i></button>
    </div>`).join('');
}
function addStageInput(){if(!dev.stages)dev.stages=[...DEFAULT_STAGES];dev.stages.push('New stage');renderStageInputs();}
async function saveSettings(){
  const newW=parseInt(document.getElementById('s-cw').value)||CANVAS_W;
  const newH=parseInt(document.getElementById('s-ch').value)||CANVAS_H;
  const data={title:document.getElementById('s-title').value.trim()||null,developer_id:document.getElementById('s-developer-id').value||null,stages:JSON.stringify(dev.stages||DEFAULT_STAGES),canvas_w:newW,canvas_h:newH};
  if(pendingUploadFile){
    try{const url=await uploadFile(pendingUploadFile,`${DEV_ID}-ref-${Date.now()}.${pendingUploadFile.name.split('.').pop()}`);data.site_plan_url=url;dev.site_plan_url=url;loadRef(url);}
    catch(e){toast('Upload failed: '+e.message);return;}
  }
  try{
    await db(`developments?id=eq.${DEV_ID}`,{method:'PATCH',body:JSON.stringify(data)});
    Object.assign(dev,data);dev.stages=safeJson(dev.stages,DEFAULT_STAGES);
    if(newW!==CANVAS_W||newH!==CANVAS_H){CANVAS_W=newW;CANVAS_H=newH;setupCanvas();setTimeout(fitView,50);}
    document.getElementById('nav-label').textContent=dev.title||'Development';
    closeSettings();toast('Saved');
  }catch(e){toast('Save failed: '+e.message);}
}
</script>
</body>
