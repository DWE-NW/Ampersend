<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Developments — Ampersend</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
  <style>
    :root{
      --black:#1a1a1a;--blue:#1a6eff;--blue-light:rgba(26,110,255,0.08);
      --white:#fff;--surface:#f5f5f7;--border:rgba(0,0,0,0.1);
      --muted:#888;--red:#dc3545;--red-light:rgba(220,53,69,0.08);
      --green:#1e7e34;--amber:#BA7517;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--black);background:var(--surface);}
    nav{height:48px;background:var(--white);border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:100;}
    .logo{font-size:16px;font-weight:600;letter-spacing:-0.03em;color:var(--black);text-decoration:none;}
    .logo span{color:var(--blue);}
    .nav-sep{width:0.5px;height:18px;background:var(--border);}
    .nav-label{font-size:13px;font-weight:500;}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
    .nbtn{padding:6px 12px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--white);color:var(--black);display:flex;align-items:center;gap:5px;font-family:inherit;text-decoration:none;}
    .nbtn.primary{background:var(--black);color:#fff;border-color:var(--black);}
    .nbtn:hover{background:var(--surface);}
    .nbtn.primary:hover{background:#333;}

    /* ── INDEX VIEW ── */
    #index-view{display:none;padding:28px 24px;max-width:960px;margin:0 auto;}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
    .page-title{font-size:20px;font-weight:700;letter-spacing:-0.02em;}
    .dev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
    .dev-card{background:var(--white);border:0.5px solid var(--border);border-radius:8px;padding:18px;cursor:pointer;transition:box-shadow 0.15s;}
    .dev-card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.08);}
    .dev-card-name{font-size:15px;font-weight:700;letter-spacing:-0.01em;margin-bottom:2px;}
    .dev-card-meta{font-size:12px;color:var(--muted);margin-bottom:14px;}
    .dev-card-sites{display:flex;flex-direction:column;gap:8px;}
    .dev-site-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface);border-radius:5px;cursor:pointer;}
    .dev-site-row:hover{background:#ebebeb;}
    .dev-site-name{font-size:12px;font-weight:500;flex:1;}
    .dev-site-stats{font-size:11px;color:var(--muted);}
    .dev-site-prog{width:60px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0;}
    .dev-site-prog-fill{height:3px;background:var(--blue);border-radius:2px;}
    .dev-card-footer{margin-top:12px;padding-top:10px;border-top:0.5px solid var(--border);display:flex;gap:16px;}
    .dev-stat{text-align:center;}
    .dev-stat .n{font-size:18px;font-weight:700;}
    .dev-stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
    .empty-index{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px;line-height:1.8;}
    .empty-index i{font-size:40px;display:block;margin-bottom:12px;opacity:0.3;}

    /* ── SITE PLAN VIEW ── */
    #site-view{display:none;height:calc(100vh - 48px);}
    .site-body{display:flex;height:100%;}
    .sidebar{width:260px;flex-shrink:0;background:var(--white);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
    .sbh{padding:14px 14px 10px;border-bottom:0.5px solid var(--border);}
    .sbl{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
    .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:0;}
    .sc2{background:var(--surface);border-radius:6px;padding:8px 10px;}
    .sc2 .n{font-size:18px;font-weight:700;color:var(--black);}
    .sc2 .l{font-size:10px;color:var(--muted);font-weight:500;letter-spacing:0.04em;text-transform:uppercase;margin-top:2px;}
    .sc2.done .n{color:var(--green);}
    .lot-list{flex:1;overflow-y:auto;}
    .lot-item{padding:10px 14px;border-bottom:0.5px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px;}
    .lot-item:hover{background:var(--surface);}
    .lot-item.sel{background:var(--blue-light);}
    .lot-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
    .lot-info{flex:1;min-width:0;}
    .lot-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .lot-stage{font-size:11px;color:var(--muted);margin-top:1px;}
    .lot-prog{height:2px;background:var(--border);border-radius:1px;margin-top:5px;overflow:hidden;}
    .lot-prog-fill{height:2px;background:var(--blue);border-radius:1px;}
    .empty-lots{padding:2rem 1rem;text-align:center;color:var(--muted);font-size:13px;line-height:1.6;}
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
    .toolbar{height:44px;background:var(--white);border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;}
    .tb-sep{width:0.5px;height:20px;background:var(--border);margin:0 4px;}
    .tb-label{font-size:10px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);}
    .zb{padding:3px 9px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--white);color:var(--muted);font-family:inherit;}
    .zb:hover{background:var(--surface);color:var(--black);}
    .grid-toggle{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none;}
    .canvas-wrap{flex:1;overflow:hidden;position:relative;background:#2a2a2a;}
    .canvas-container{position:absolute;transform-origin:top left;cursor:grab;}
    .canvas-container.grabbing{cursor:grabbing;}
    #site-canvas{display:block;}
    .empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:rgba(255,255,255,0.4);}
    .empty-state i{font-size:48px;}
    .empty-state p{font-size:13px;text-align:center;line-height:1.6;max-width:280px;}
    .dpanel{position:absolute;right:0;top:0;bottom:0;width:240px;background:var(--white);border-left:0.5px solid var(--border);transform:translateX(100%);transition:transform 0.2s;display:flex;flex-direction:column;z-index:50;}
    .dpanel.open{transform:translateX(0);}
    .dph{padding:12px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .dph-t{font-size:13px;font-weight:600;}
    .dph-x{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px;line-height:1;}
    .dpb{flex:1;overflow-y:auto;padding:14px;}
    .dpf{margin-bottom:12px;}
    .dpl{font-size:10px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
    .dpv{font-size:13px;}
    .dpa{padding:12px 14px;border-top:0.5px solid var(--border);display:flex;flex-direction:column;gap:8px;}
    .dbtn{width:100%;padding:8px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--white);color:var(--black);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;}
    .dbtn.danger{color:var(--red);border-color:var(--red);}
    .stage-row{display:flex;flex-direction:column;gap:4px;}
    .stage-btn{padding:6px 10px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--white);color:var(--muted);font-family:inherit;text-align:left;display:flex;align-items:center;gap:6px;}
    .stage-btn.active-stage{background:var(--blue);color:#fff;border-color:var(--blue);}
    .stage-btn.done-stage{background:var(--surface);color:var(--black);}

    /* ── MODALS ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:center;justify-content:center;}
    .overlay.open{display:flex;}
    .modal{background:var(--white);border-radius:8px;width:500px;max-width:94vw;max-height:90vh;overflow:auto;box-shadow:0 8px 40px rgba(0,0,0,0.2);}
    .mh{padding:16px 20px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .mh-t{font-size:15px;font-weight:600;}
    .mh-x{background:none;border:none;cursor:pointer;color:var(--muted);font-size:22px;line-height:1;}
    .mb{padding:20px;display:flex;flex-direction:column;gap:14px;}
    .mf{padding:14px 20px;border-top:0.5px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
    .mbtn{padding:7px 16px;border-radius:4px;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--white);color:var(--black);font-family:inherit;}
    .mbtn.primary{background:var(--black);color:#fff;border-color:var(--black);}
    .fg{display:flex;flex-direction:column;gap:5px;}
    .fg label{font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);}
    .fg input,.fg select,.fg textarea{font-size:13px;padding:8px 10px;border:0.5px solid var(--border);border-radius:4px;background:var(--white);color:var(--black);width:100%;font-family:inherit;}
    .fg textarea{resize:vertical;min-height:60px;}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .upload-area{border:1.5px dashed var(--border);border-radius:6px;padding:28px;text-align:center;cursor:pointer;color:var(--muted);font-size:13px;line-height:1.6;transition:border-color 0.15s;}
    .upload-area:hover,.upload-area.has-file{border-color:var(--blue);color:var(--blue);}
    .upload-area i{font-size:28px;display:block;margin-bottom:8px;opacity:0.5;}
    .stage-list{display:flex;flex-direction:column;gap:6px;}
    .stage-input-row{display:flex;gap:6px;align-items:center;}
    .stage-input-row input{flex:1;font-size:13px;padding:6px 10px;border:0.5px solid var(--border);border-radius:4px;font-family:inherit;}
    .stage-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px;}
    .stage-del:hover{color:var(--red);}

    /* new developer inline form */
    .new-dev-form{background:var(--surface);border-radius:6px;padding:12px;display:none;flex-direction:column;gap:10px;}
    .new-dev-form.show{display:flex;}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--black);color:#fff;padding:8px 18px;border-radius:6px;font-size:13px;opacity:0;transition:all 0.2s;pointer-events:none;z-index:999;white-space:nowrap;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>

<nav>
  <a class="logo" href="/"><span>dw—</span>electric</a>
  <div class="nav-sep"></div>
  <span class="nav-label" id="nav-label">Developments</span>
  <div class="nav-right" id="nav-right">
    <a class="nbtn" href="/tracker.html"><i class="ti ti-map"></i> Tracker</a>
    <button class="nbtn primary" id="nav-primary-btn"><i class="ti ti-plus"></i> New developer</button>
  </div>
</nav>

<!-- ── INDEX VIEW ── -->
<div id="index-view">
  <div class="page-header">
    <div class="page-title">All Developers</div>
  </div>
  <div class="dev-grid" id="dev-grid">
    <div style="color:var(--muted);font-size:13px">Loading…</div>
  </div>
</div>

<!-- ── SITE PLAN VIEW ── -->
<div id="site-view">
  <div class="site-body">
    <div class="sidebar">
      <div class="sbh">
        <div class="sbl">Lots</div>
        <div class="stats">
          <div class="sc2"><div class="n" id="st-total">0</div><div class="l">Total</div></div>
          <div class="sc2"><div class="n" id="st-active">0</div><div class="l">Active</div></div>
          <div class="sc2 done"><div class="n" id="st-done">0</div><div class="l">Done</div></div>
        </div>
      </div>
      <div class="lot-list" id="lot-list"></div>
    </div>

    <div class="main">
      <div class="toolbar">
        <span class="tb-label">Zoom</span>
        <button class="zb" onclick="setZoom(0.5)">50%</button>
        <button class="zb" onclick="setZoom(0.75)">75%</button>
        <button class="zb" onclick="setZoom(1)">100%</button>
        <button class="zb" onclick="setZoom(1.5)">150%</button>
        <button class="zb" onclick="fitToView()">Fit</button>
        <div class="tb-sep"></div>
        <span class="tb-label">Cell size</span>
        <button class="zb" onclick="setCellSize(20)">Fine</button>
        <button class="zb" onclick="setCellSize(40)">Medium</button>
        <button class="zb" onclick="setCellSize(80)">Coarse</button>
        <div class="tb-sep"></div>
        <label class="grid-toggle"><input type="checkbox" id="grid-toggle" checked onchange="redraw()"/> Grid</label>
      </div>

      <div class="canvas-wrap" id="canvas-wrap">
        <div class="empty-state" id="empty-state">
          <i class="ti ti-map-2"></i>
          <p>No site plan uploaded yet.<br>Click Settings to upload one.</p>
        </div>
        <div class="canvas-container" id="canvas-container">
          <canvas id="site-canvas"></canvas>
        </div>
      </div>

      <div class="dpanel" id="dpanel">
        <div class="dph"><span class="dph-t" id="dp-title">Lot</span><button class="dph-x" onclick="closeDetail()">×</button></div>
        <div class="dpb" id="dp-body"></div>
        <div class="dpa">
          <button class="dbtn" onclick="editLotOpen()"><i class="ti ti-edit"></i> Edit lot</button>
          <button class="dbtn danger" onclick="deleteLot()"><i class="ti ti-trash"></i> Delete lot</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- NEW DEVELOPER MODAL -->
<div class="overlay" id="new-dev-overlay">
  <div class="modal">
    <div class="mh"><span class="mh-t">New developer</span><button class="mh-x" onclick="closeNewDev()">×</button></div>
    <div class="mb">
      <div class="fg"><label>Company / Developer name</label><input id="nd-name" placeholder="Tricar Group"/></div>
      <div class="g2">
        <div class="fg"><label>Phone</label><input id="nd-phone" placeholder="(705) 555-0100"/></div>
        <div class="fg"><label>Email</label><input id="nd-email" type="email" placeholder="contact@developer.ca"/></div>
      </div>
      <div class="fg"><label>Address</label><input id="nd-address" placeholder="123 Main St, Peterborough ON"/></div>
      <div class="fg"><label>Notes</label><textarea id="nd-notes" placeholder="Any notes…"></textarea></div>
    </div>
    <div class="mf">
      <button class="mbtn" onclick="closeNewDev()">Cancel</button>
      <button class="mbtn primary" onclick="saveNewDev()"><i class="ti ti-check"></i> Create developer</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL (site plan view) -->
<div class="overlay" id="settings-overlay">
  <div class="modal">
    <div class="mh"><span class="mh-t">Development settings</span><button class="mh-x" onclick="closeSettings()">×</button></div>
    <div class="mb">
      <div class="g2">
        <div class="fg"><label>Title</label><input id="s-title" placeholder="Riverbend Phase 1"/></div>
        <div class="fg"><label>Developer</label>
          <select id="s-developer-id"></select>
        </div>
      </div>
      <div class="fg"><label>Site plan image</label>
        <div class="upload-area" id="upload-area" onclick="document.getElementById('plan-file').click()">
          <i class="ti ti-photo-up"></i>
          Click to upload site plan (PNG or JPG)
        </div>
        <input type="file" id="plan-file" accept="image/png,image/jpeg" style="display:none" onchange="handleUpload(this)"/>
      </div>
      <div class="fg">
        <label>Project stages (in order)</label>
        <div class="stage-list" id="stage-list"></div>
        <button class="nbtn" style="margin-top:6px;font-size:11px" onclick="addStageInput()"><i class="ti ti-plus"></i> Add stage</button>
      </div>
    </div>
    <div class="mf">
      <button class="mbtn" onclick="closeSettings()">Cancel</button>
      <button class="mbtn primary" onclick="saveSettings()"><i class="ti ti-check"></i> Save</button>
    </div>
  </div>
</div>

<!-- ADD / EDIT LOT MODAL -->
<div class="overlay" id="lot-overlay">
  <div class="modal">
    <div class="mh"><span class="mh-t" id="lot-modal-title">Add lot</span><button class="mh-x" onclick="closeLotModal()">×</button></div>
    <div class="mb">
      <div class="g2">
        <div class="fg"><label>Lot name / number</label><input id="l-name" placeholder="Lot 12"/></div>
        <div class="fg"><label>Customer</label><input id="l-customer" placeholder="Jane Smith"/></div>
      </div>
      <div class="g2">
        <div class="fg"><label>Phone</label><input id="l-phone" placeholder="(705) 555-0100"/></div>
        <div class="fg"><label>Email</label><input id="l-email" type="email" placeholder="jane@email.com"/></div>
      </div>
      <div class="fg"><label>Notes</label><textarea id="l-notes"></textarea></div>
      <div class="fg"><label>Starting stage</label><select id="l-stage"></select></div>
    </div>
    <div class="mf">
      <button class="mbtn" onclick="closeLotModal()">Cancel</button>
      <button class="mbtn primary" onclick="saveLot()"><i class="ti ti-check"></i> Save lot</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://vojgddmlwakvhmbkzfld.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvamdkZG1sd2FrdmhtYmt6ZmxkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NDQ1MzAsImV4cCI6MjA5NzIyMDUzMH0.PGu1HeCZ3SsMgRyLC_s4xP8m3Qt73NlRyvzA-hFroEk';
const STORAGE_URL=`${SUPABASE_URL}/storage/v1/object/public/site-plans`;

async function db(path,opts={}){
  const isWrite=opts.method&&opts.method!=='GET';
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json',
      ...(isWrite?{'Prefer':'return=representation'}:{}),...(opts.headers||{})},
    ...opts
  });
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const t=await res.text();return t?JSON.parse(t):[];
}

async function uploadImage(file,devId){
  const ext=file.name.split('.').pop();
  const fname=`${devId}-${Date.now()}.${ext}`;
  const res=await fetch(`${SUPABASE_URL}/storage/v1/object/site-plans/${fname}`,{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':file.type},
    body:file
  });
  if(!res.ok)throw new Error('Upload failed');
  return`${STORAGE_URL}/${fname}`;
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function safeJson(v,def){try{return v?(typeof v==='string'?JSON.parse(v):v):def;}catch{return def;}}

// ── ROUTING ───────────────────────────────────────────────────
const params=new URLSearchParams(location.search);
const devId=params.get('id')?parseInt(params.get('id')):null;

if(devId){initSiteView();}
else{initIndexView();}

// ══════════════════════════════════════════════════════════════
// INDEX VIEW
// ══════════════════════════════════════════════════════════════
async function initIndexView(){
  document.getElementById('index-view').style.display='block';
  document.getElementById('nav-primary-btn').onclick=openNewDev;
  loadIndex();
}

async function loadIndex(){
  try{
    const [developers, developments]=await Promise.all([
      db('developers?select=*&order=name'),
      db('developments?select=id,title,developer_id,lots,site_plan_url&order=created_at.desc')
    ]);
    renderIndex(developers,developments);
  }catch(e){document.getElementById('dev-grid').innerHTML=`<div style="color:var(--red);font-size:13px">Load failed: ${esc(e.message)}</div>`;}
}

function renderIndex(developers,developments){
  const grid=document.getElementById('dev-grid');
  if(!developers.length){
    grid.innerHTML=`<div class="empty-index"><i class="ti ti-building-community"></i>No developers yet.<br>Click <strong>New developer</strong> to get started.</div>`;
    return;
  }
  grid.innerHTML=developers.map(dev=>{
    const sites=developments.filter(d=>d.developer_id===dev.id);
    const totalLots=sites.reduce((sum,s)=>sum+safeJson(s.lots,[]).length,0);
    const doneLots=sites.reduce((sum,s)=>{
      const lots=safeJson(s.lots,[]);
      // count lots where stage >= stages length — we don't have stages here so use stage>=4 as proxy
      return sum+lots.filter(l=>(l.stage||0)>=4).length;
    },0);
    const activeLots=totalLots-doneLots;
    const siteRows=sites.map(s=>{
      const lots=safeJson(s.lots,[]);
      const done=lots.filter(l=>(l.stage||0)>=4).length;
      const pct=lots.length?Math.round(done/lots.length*100):0;
      return`<div class="dev-site-row" onclick="window.location.href='/development.html?id=${s.id}'">
        <span class="dev-site-name">${esc(s.title||'Unnamed')}</span>
        <span class="dev-site-stats">${lots.length} lots</span>
        <div class="dev-site-prog"><div class="dev-site-prog-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('')||`<div style="font-size:12px;color:var(--muted);padding:6px 0">No developments yet</div>`;
    return`<div class="dev-card">
      <div class="dev-card-name">${esc(dev.name)}</div>
      <div class="dev-card-meta">${dev.phone||''}${dev.phone&&dev.email?' · ':''}${dev.email||''}</div>
      <div class="dev-card-sites">${siteRows}</div>
      <div class="dev-card-footer">
        <div class="dev-stat"><div class="n">${sites.length}</div><div class="l">Sites</div></div>
        <div class="dev-stat"><div class="n">${totalLots}</div><div class="l">Lots</div></div>
        <div class="dev-stat"><div class="n">${activeLots}</div><div class="l">Active</div></div>
        <div class="dev-stat"><div class="n">${doneLots}</div><div class="l">Done</div></div>
      </div>
    </div>`;
  }).join('');
}

// New developer modal
function openNewDev(){
  ['nd-name','nd-phone','nd-email','nd-address','nd-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('new-dev-overlay').classList.add('open');
}
function closeNewDev(){document.getElementById('new-dev-overlay').classList.remove('open');}
async function saveNewDev(){
  const name=document.getElementById('nd-name').value.trim();
  if(!name){toast('Please enter a developer name');return;}
  try{
    await db('developers',{method:'POST',body:JSON.stringify({
      name,
      phone:document.getElementById('nd-phone').value.trim()||null,
      email:document.getElementById('nd-email').value.trim()||null,
      address:document.getElementById('nd-address').value.trim()||null,
      notes:document.getElementById('nd-notes').value.trim()||null,
    })});
    closeNewDev();loadIndex();toast('Developer created');
  }catch(e){toast('Error: '+e.message);}
}

// ══════════════════════════════════════════════════════════════
// SITE PLAN VIEW
// ══════════════════════════════════════════════════════════════
let dev=null,lots=[],selLotIdx=null,editLotIdx=null,pendingCell=null,pendingUploadFile=null;
let allDevelopers=[];
const DEFAULT_STAGES=['Site visit','Rough-in','Inspection','Final'];
const STAGE_COLOURS=['#1a6eff','#BA7517','#1e7e34','#dc3545','#888','#6f42c1'];

function lotColour(lot){
  const stages=dev?.stages||DEFAULT_STAGES;
  const done=lot.stage||0;
  if(done>=stages.length)return'#1e7e34';
  if(done===0)return'#555';
  return STAGE_COLOURS[(done-1)%STAGE_COLOURS.length];
}

function hexToRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}

// Canvas
let zoom=1,panX=0,panY=0,isPanning=false,lastMX=0,lastMY=0;
let cellSize=40,siteImage=null,showGrid=true;
const wrap=document.getElementById('canvas-wrap');
const container=document.getElementById('canvas-container');
const canvas=document.getElementById('site-canvas');
const ctx=canvas.getContext('2d');

function setZoom(z){zoom=Math.max(0.2,Math.min(4,z));applyTransform();}
function setCellSize(s){cellSize=s;redraw();}
function applyTransform(){container.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;}
function fitToView(){
  if(!siteImage)return;
  const ww=wrap.clientWidth,wh=wrap.clientHeight;
  zoom=Math.min(ww/canvas.width,wh/canvas.height)*0.9;
  panX=(ww-canvas.width*zoom)/2;panY=(wh-canvas.height*zoom)/2;
  applyTransform();
}

wrap.addEventListener('mousedown',e=>{if(container.contains(e.target)){isPanning=true;lastMX=e.clientX;lastMY=e.clientY;container.classList.add('grabbing');}});
window.addEventListener('mousemove',e=>{if(!isPanning)return;panX+=e.clientX-lastMX;panY+=e.clientY-lastMY;lastMX=e.clientX;lastMY=e.clientY;applyTransform();});
window.addEventListener('mouseup',()=>{isPanning=false;container.classList.remove('grabbing');});
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const prev=zoom;zoom=Math.max(0.2,Math.min(4,zoom+(e.deltaY>0?-0.1:0.1)));
  const rect=wrap.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  panX=mx-(mx-panX)*(zoom/prev);panY=my-(my-panY)*(zoom/prev);
  applyTransform();
},{passive:false});

canvas.addEventListener('click',e=>{
  if(!siteImage)return;
  const rect=canvas.getBoundingClientRect();
  const cx=(e.clientX-rect.left)*(canvas.width/rect.width);
  const cy=(e.clientY-rect.top)*(canvas.height/rect.height);
  const key=`${Math.floor(cy/cellSize)}_${Math.floor(cx/cellSize)}`;
  const idx=lots.findIndex(l=>l.cell===key);
  if(idx>=0)showDetail(idx);
  else openAddLotAtCell(key);
});

function redraw(){
  if(!siteImage)return;
  showGrid=document.getElementById('grid-toggle').checked;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(siteImage,0,0,canvas.width,canvas.height);
  lots.forEach((lot,idx)=>{
    const[row,col]=lot.cell.split('_').map(Number);
    const x=col*cellSize,y=row*cellSize;
    ctx.fillStyle=hexToRgba(lotColour(lot),0.5);
    ctx.fillRect(x,y,cellSize,cellSize);
    if(selLotIdx===idx){ctx.strokeStyle='#1a6eff';ctx.lineWidth=2;ctx.strokeRect(x+1,y+1,cellSize-2,cellSize-2);}
    const fs=Math.max(8,Math.min(13,cellSize*0.28));
    ctx.fillStyle='#fff';ctx.font=`bold ${fs}px -apple-system,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(lot.name||'',x+cellSize/2,y+cellSize/2);
  });
  if(showGrid){
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=0.5;
    for(let x=0;x<=canvas.width;x+=cellSize){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
    for(let y=0;y<=canvas.height;y+=cellSize){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}
  }
}

function loadImage(url){
  const img=new Image();img.crossOrigin='anonymous';
  img.onload=()=>{siteImage=img;canvas.width=img.naturalWidth;canvas.height=img.naturalHeight;document.getElementById('empty-state').style.display='none';redraw();setTimeout(fitToView,50);};
  img.onerror=()=>toast('Could not load site plan image');
  img.src=url;
}

async function initSiteView(){
  document.getElementById('site-view').style.display='block';
  document.getElementById('nav-primary-btn').textContent='';
  document.getElementById('nav-primary-btn').innerHTML='<i class="ti ti-settings"></i> Settings';
  document.getElementById('nav-primary-btn').onclick=openSettings;
  // Add "Add lot" button
  const addBtn=document.createElement('button');
  addBtn.className='nbtn primary';addBtn.innerHTML='<i class="ti ti-plus"></i> Add lot';
  addBtn.onclick=openAddLot;
  document.getElementById('nav-right').appendChild(addBtn);
  // Back breadcrumb
  const back=document.createElement('a');back.className='nbtn';back.href='/development.html';back.innerHTML='<i class="ti ti-arrow-left"></i> All developers';
  document.getElementById('nav-right').prepend(back);
  await loadSite();
}

async function loadSite(){
  try{
    const [rows, devRows]=await Promise.all([
      db(`developments?id=eq.${devId}&select=*,developers(name)`),
      db('developers?select=id,name&order=name')
    ]);
    allDevelopers=devRows;
    if(!rows.length){toast('Development not found');return;}
    dev=rows[0];
    dev.stages=safeJson(dev.stages,DEFAULT_STAGES);
    lots=safeJson(dev.lots,[]);
    const devName=dev.developers?.name||'';
    document.getElementById('nav-label').textContent=dev.title||'Development';
    document.title=`${dev.title||'Development'} — Ampersend`;
    renderStats();renderLotList();
    if(dev.site_plan_url)loadImage(dev.site_plan_url);
  }catch(e){toast('Load failed: '+e.message);}
}

function renderStats(){
  const stages=dev?.stages||DEFAULT_STAGES;
  const done=lots.filter(l=>(l.stage||0)>=stages.length).length;
  document.getElementById('st-total').textContent=lots.length;
  document.getElementById('st-active').textContent=lots.filter(l=>(l.stage||0)>0&&(l.stage||0)<stages.length).length;
  document.getElementById('st-done').textContent=done;
}

function renderLotList(){
  const list=document.getElementById('lot-list');
  if(!lots.length){list.innerHTML='<div class="empty-lots">No lots yet.<br>Click a cell on the site plan to add one.</div>';return;}
  const stages=dev?.stages||DEFAULT_STAGES;
  list.innerHTML=lots.map((lot,idx)=>{
    const done=lot.stage||0,total=stages.length,pct=Math.round(done/total*100);
    const stageName=done>=total?'Complete':(stages[done]||'Not started');
    return`<div class="lot-item ${selLotIdx===idx?'sel':''}" onclick="showDetail(${idx})">
      <div class="lot-dot" style="background:${lotColour(lot)}"></div>
      <div class="lot-info">
        <div class="lot-name">${esc(lot.name||'Unnamed')}</div>
        <div class="lot-stage">${esc(stageName)}</div>
        <div class="lot-prog"><div class="lot-prog-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  }).join('');
}

function showDetail(idx){
  selLotIdx=idx;const lot=lots[idx];
  const stages=dev?.stages||DEFAULT_STAGES;const done=lot.stage||0;
  document.getElementById('dp-title').textContent=lot.name||'Lot';
  const stageRows=stages.map((s,i)=>`
    <button class="stage-btn ${i<done?'done-stage':''} ${i===done?'active-stage':''}" onclick="setLotStage(${idx},${i+1})">
      <i class="ti ti-${i<done?'check':'circle'}"></i>${esc(s)}
    </button>`).join('');
  document.getElementById('dp-body').innerHTML=`
    ${lot.customer?`<div class="dpf"><div class="dpl">Customer</div><div class="dpv">${esc(lot.customer)}</div></div>`:''}
    ${lot.phone?`<div class="dpf"><div class="dpl">Phone</div><div class="dpv">${esc(lot.phone)}</div></div>`:''}
    ${lot.email?`<div class="dpf"><div class="dpl">Email</div><div class="dpv">${esc(lot.email)}</div></div>`:''}
    ${lot.notes?`<div class="dpf"><div class="dpl">Notes</div><div class="dpv">${esc(lot.notes)}</div></div>`:''}
    <div class="dpf"><div class="dpl">Progress</div><div class="stage-row">${stageRows}</div></div>`;
  document.getElementById('dpanel').classList.add('open');
  renderLotList();redraw();
}

function closeDetail(){selLotIdx=null;document.getElementById('dpanel').classList.remove('open');renderLotList();redraw();}

async function setLotStage(idx,stage){
  lots[idx].stage=stage;await saveLots();showDetail(idx);renderStats();
}

function openAddLot(){pendingCell=null;editLotIdx=null;_fillLotModal('Add lot',{name:`Lot ${lots.length+1}`});document.getElementById('lot-overlay').classList.add('open');}
function openAddLotAtCell(key){pendingCell=key;editLotIdx=null;_fillLotModal('Add lot',{name:`Lot ${lots.length+1}`});document.getElementById('lot-overlay').classList.add('open');}
function editLotOpen(){
  if(selLotIdx===null)return;
  editLotIdx=selLotIdx;pendingCell=lots[selLotIdx].cell;
  _fillLotModal('Edit lot',lots[selLotIdx]);
  document.getElementById('lot-overlay').classList.add('open');
}
function _fillLotModal(title,lot){
  document.getElementById('lot-modal-title').textContent=title;
  document.getElementById('l-name').value=lot.name||'';
  document.getElementById('l-customer').value=lot.customer||'';
  document.getElementById('l-phone').value=lot.phone||'';
  document.getElementById('l-email').value=lot.email||'';
  document.getElementById('l-notes').value=lot.notes||'';
  const stages=dev?.stages||DEFAULT_STAGES;
  document.getElementById('l-stage').innerHTML=stages.map((s,i)=>`<option value="${i}" ${(lot.stage||0)===i?'selected':''}>${s}</option>`).join('');
}
function closeLotModal(){document.getElementById('lot-overlay').classList.remove('open');pendingCell=null;editLotIdx=null;}

async function saveLot(){
  const name=document.getElementById('l-name').value.trim();
  if(!name){toast('Please enter a lot name');return;}
  const lot={name,cell:pendingCell||`0_${lots.length}`,
    customer:document.getElementById('l-customer').value.trim(),
    phone:document.getElementById('l-phone').value.trim(),
    email:document.getElementById('l-email').value.trim(),
    notes:document.getElementById('l-notes').value.trim(),
    stage:parseInt(document.getElementById('l-stage').value)||0};
  if(editLotIdx!==null)lots[editLotIdx]=lot;
  else lots.push(lot);
  await saveLots();closeLotModal();renderStats();renderLotList();redraw();toast('Lot saved');
}

async function deleteLot(){
  if(selLotIdx===null)return;
  if(!confirm('Delete this lot?'))return;
  lots.splice(selLotIdx,1);await saveLots();closeDetail();renderStats();renderLotList();redraw();toast('Deleted');
}

async function saveLots(){
  await db(`developments?id=eq.${devId}`,{method:'PATCH',body:JSON.stringify({lots:JSON.stringify(lots)})});
}

// Settings
function openSettings(){
  document.getElementById('s-title').value=dev.title||'';
  // Populate developer select
  document.getElementById('s-developer-id').innerHTML=
    `<option value="">— No developer —</option>`
    +allDevelopers.map(d=>`<option value="${d.id}" ${dev.developer_id===d.id?'selected':''}>${esc(d.name)}</option>`).join('');
  document.getElementById('upload-area').innerHTML=dev.site_plan_url
    ?`<i class="ti ti-photo-check"></i>Site plan uploaded — click to replace`
    :`<i class="ti ti-photo-up"></i>Click to upload site plan (PNG or JPG)`;
  document.getElementById('upload-area').className='upload-area'+(dev.site_plan_url?' has-file':'');
  renderStageInputs();
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings(){document.getElementById('settings-overlay').classList.remove('open');pendingUploadFile=null;}
function renderStageInputs(){
  const stages=dev?.stages||DEFAULT_STAGES;
  document.getElementById('stage-list').innerHTML=stages.map((s,i)=>`
    <div class="stage-input-row">
      <input value="${esc(s)}" placeholder="Stage name" oninput="dev.stages[${i}]=this.value"/>
      <button class="stage-del" onclick="removeStage(${i})"><i class="ti ti-x"></i></button>
    </div>`).join('');
}
function addStageInput(){if(!dev.stages)dev.stages=[...DEFAULT_STAGES];dev.stages.push('New stage');renderStageInputs();}
function removeStage(i){dev.stages=(dev.stages||DEFAULT_STAGES).filter((_,idx)=>idx!==i);renderStageInputs();}
function handleUpload(input){
  const file=input.files[0];if(!file)return;pendingUploadFile=file;
  document.getElementById('upload-area').innerHTML=`<i class="ti ti-photo-check"></i>${esc(file.name)} — ready to save`;
  document.getElementById('upload-area').classList.add('has-file');
}
async function saveSettings(){
  const data={
    title:document.getElementById('s-title').value.trim()||null,
    developer_id:document.getElementById('s-developer-id').value||null,
    stages:JSON.stringify(dev.stages||DEFAULT_STAGES),
  };
  if(pendingUploadFile){
    try{data.site_plan_url=await uploadImage(pendingUploadFile,devId);dev.site_plan_url=data.site_plan_url;}
    catch(e){toast('Upload failed: '+e.message);return;}
  }
  try{
    await db(`developments?id=eq.${devId}`,{method:'PATCH',body:JSON.stringify(data)});
    Object.assign(dev,data);dev.stages=safeJson(dev.stages,DEFAULT_STAGES);
    document.getElementById('nav-label').textContent=dev.title||'Development';
    if(data.site_plan_url)loadImage(data.site_plan_url);
    closeSettings();toast('Saved');
  }catch(e){toast('Save failed: '+e.message);}
}
</script>
