<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Developments — Ampersend</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
  <style>
    :root{
      --black:#1a1a1a;--blue:#1a6eff;--blue-light:rgba(26,110,255,0.08);
      --white:#fff;--surface:#f5f5f7;--border:rgba(0,0,0,0.1);
      --muted:#888;--red:#dc3545;--green:#1e7e34;--amber:#BA7517;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--black);background:var(--surface);}
    nav{height:48px;background:var(--white);border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:200;}
    .logo{font-size:16px;font-weight:600;letter-spacing:-0.03em;color:var(--black);text-decoration:none;}
    .logo span{color:var(--blue);}
    .nav-sep{width:0.5px;height:18px;background:var(--border);}
    .nav-label{font-size:13px;font-weight:500;}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
    .nbtn{padding:6px 12px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--white);color:var(--black);display:flex;align-items:center;gap:5px;font-family:inherit;text-decoration:none;white-space:nowrap;}
    .nbtn.primary{background:var(--black);color:#fff;border-color:var(--black);}
    .nbtn:hover:not(.primary){background:var(--surface);}
    .nbtn.primary:hover{background:#333;}

    /* INDEX */
    #index-view{display:none;padding:28px 24px;max-width:960px;margin:0 auto;}
    .page-title{font-size:20px;font-weight:700;letter-spacing:-0.02em;margin-bottom:24px;}
    .dev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
    .dev-card{background:var(--white);border:0.5px solid var(--border);border-radius:8px;padding:18px;transition:box-shadow 0.15s;}
    .dev-card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.08);}
    .dev-card-name{font-size:15px;font-weight:700;letter-spacing:-0.01em;margin-bottom:2px;}
    .dev-card-meta{font-size:12px;color:var(--muted);margin-bottom:14px;}
    .dev-card-sites{display:flex;flex-direction:column;gap:6px;}
    .dev-site-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface);border-radius:5px;cursor:pointer;}
    .dev-site-row:hover{background:#e8e8e8;}
    .dev-site-name{font-size:12px;font-weight:500;flex:1;}
    .dev-site-stats{font-size:11px;color:var(--muted);}
    .dev-site-prog{width:60px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0;}
    .dev-site-prog-fill{height:3px;background:var(--blue);border-radius:2px;}
    .dev-card-footer{margin-top:12px;padding-top:10px;border-top:0.5px solid var(--border);display:flex;gap:16px;}
    .dev-stat .n{font-size:18px;font-weight:700;}
    .dev-stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
    .empty-index{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px;line-height:1.8;}
    .empty-index i{font-size:40px;display:block;margin-bottom:12px;opacity:0.3;}
    .no-sites{font-size:12px;color:var(--muted);padding:4px 0;}

    /* SITE VIEW */
    #site-view{display:none;height:calc(100vh - 48px);}
    .site-body{display:flex;height:100%;overflow:hidden;}

    /* Sidebar */
    .sidebar{width:240px;flex-shrink:0;background:var(--white);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
    .sbh{padding:12px 14px 10px;border-bottom:0.5px solid var(--border);}
    .sbl{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
    .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
    .sc2{background:var(--surface);border-radius:5px;padding:7px 9px;}
    .sc2 .n{font-size:17px;font-weight:700;}
    .sc2 .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin-top:1px;}
    .sc2.done .n{color:var(--green);}
    .lot-list{flex:1;overflow-y:auto;}
    .lot-item{padding:9px 14px;border-bottom:0.5px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:9px;}
    .lot-item:hover{background:var(--surface);}
    .lot-item.sel{background:var(--blue-light);}
    .lot-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
    .lot-info{flex:1;min-width:0;}
    .lot-name{font-size:12px;font-weight:500;}
    .lot-stage{font-size:11px;color:var(--muted);margin-top:1px;}
    .lot-prog{height:2px;background:var(--border);border-radius:1px;margin-top:4px;overflow:hidden;}
    .lot-prog-fill{height:2px;background:var(--blue);border-radius:1px;}

    /* Canvas */
    .main{flex:1;overflow:hidden;position:relative;background:#e8e8e8;}
    .svg-outer{position:absolute;transform-origin:top left;cursor:default;user-select:none;}
    #plan-svg{display:block;width:1600px;height:1200px;}
    #plan-svg .lot-path{cursor:pointer;transition:fill 0.15s;}
    #plan-svg .lot-path:hover{opacity:0.85;}

    /* Detail panel */
    .rpanel{position:absolute;right:0;top:0;bottom:0;width:240px;background:var(--white);border-left:0.5px solid var(--border);transform:translateX(100%);transition:transform 0.2s;display:flex;flex-direction:column;z-index:50;}
    .rpanel.open{transform:translateX(0);}
    .rph{padding:12px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .rph-t{font-size:13px;font-weight:600;}
    .rph-x{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px;line-height:1;}
    .rpb{flex:1;overflow-y:auto;padding:14px;}
    .rpf{margin-bottom:11px;}
    .rpl{font-size:10px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
    .rpv{font-size:12px;}
    .rpa{padding:12px 14px;border-top:0.5px solid var(--border);display:flex;flex-direction:column;gap:7px;}
    .rpbtn{width:100%;padding:7px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--white);color:var(--black);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;}
    .rpbtn.danger{color:var(--red);border-color:var(--red);}
    .stage-row{display:flex;flex-direction:column;gap:3px;}
    .stage-btn{padding:5px 9px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--white);color:var(--muted);font-family:inherit;text-align:left;display:flex;align-items:center;gap:5px;}
    .stage-btn.active-s{background:var(--blue);color:#fff;border-color:var(--blue);}
    .stage-btn.done-s{background:var(--surface);color:var(--black);}

    /* Toolbar */
    .toolbar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:var(--white);border:0.5px solid var(--border);border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,0.1);display:flex;align-items:center;padding:6px 10px;gap:6px;z-index:40;}
    .zb{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--white);color:var(--muted);font-family:inherit;}
    .zb:hover{background:var(--surface);color:var(--black);}
    .tb-sep{width:0.5px;height:18px;background:var(--border);}

    /* Modals */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;display:none;align-items:center;justify-content:center;}
    .overlay.open{display:flex;}
    .modal{background:var(--white);border-radius:8px;width:480px;max-width:94vw;max-height:90vh;overflow:auto;box-shadow:0 8px 40px rgba(0,0,0,0.2);}
    .mh{padding:15px 20px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .mh-t{font-size:15px;font-weight:600;}
    .mh-x{background:none;border:none;cursor:pointer;color:var(--muted);font-size:22px;line-height:1;}
    .mb{padding:18px 20px;display:flex;flex-direction:column;gap:13px;}
    .mf{padding:13px 20px;border-top:0.5px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
    .mbtn{padding:7px 16px;border-radius:4px;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--white);color:var(--black);font-family:inherit;}
    .mbtn.primary{background:var(--black);color:#fff;border-color:var(--black);}
    .fg{display:flex;flex-direction:column;gap:5px;}
    .fg label{font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);}
    .fg input,.fg select,.fg textarea{font-size:13px;padding:8px 10px;border:0.5px solid var(--border);border-radius:4px;background:var(--white);color:var(--black);width:100%;font-family:inherit;}
    .fg textarea{resize:vertical;min-height:60px;}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .stage-list{display:flex;flex-direction:column;gap:5px;}
    .stage-input-row{display:flex;gap:6px;align-items:center;}
    .stage-input-row input{flex:1;font-size:13px;padding:6px 9px;border:0.5px solid var(--border);border-radius:4px;font-family:inherit;}
    .stage-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:3px;}
    .stage-del:hover{color:var(--red);}

    /* Lot selection ring */
    .lot-selected{outline:3px solid #1a6eff;outline-offset:1px;}

    .toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--black);color:#fff;padding:8px 18px;border-radius:6px;font-size:13px;opacity:0;transition:all 0.2s;pointer-events:none;z-index:999;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>

<nav>
  <a class="logo" href="/"><span>dw—</span>electric</a>
  <div class="nav-sep"></div>
  <span class="nav-label" id="nav-label">Developments</span>
  <div class="nav-right" id="nav-right">
    <a class="nbtn" href="/tracker.html"><i class="ti ti-map"></i> Tracker</a>
    <button class="nbtn primary" id="nav-primary-btn" onclick="openNewDev()"><i class="ti ti-plus"></i> New developer</button>
  </div>
</nav>

<!-- INDEX VIEW -->
<div id="index-view">
  <div class="page-title">All Developers</div>
  <div class="dev-grid" id="dev-grid"><div style="color:var(--muted);font-size:13px">Loading…</div></div>
</div>

<!-- SITE VIEW -->
<div id="site-view">
  <div class="site-body">
    <div class="sidebar">
      <div class="sbh">
        <div class="sbl">Lots</div>
        <div class="stats">
          <div class="sc2"><div class="n" id="st-total">0</div><div class="l">Total</div></div>
          <div class="sc2"><div class="n" id="st-active">0</div><div class="l">Active</div></div>
          <div class="sc2 done"><div class="n" id="st-done">0</div><div class="l">Done</div></div>
        </div>
      </div>
      <div class="lot-list" id="lot-list"></div>
    </div>

    <div class="main" id="main-wrap">
      <div class="svg-outer" id="svg-outer">
        <svg id="plan-svg" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1600 1200">
          <!-- SVG replaced at runtime -->
        </svg>
      </div>

      <!-- Zoom toolbar -->
      <div class="toolbar">
        <button class="zb" onclick="adjustZoom(-0.1)">−</button>
        <button class="zb" onclick="adjustZoom(0.1)">+</button>
        <button class="zb" onclick="fitView()">Fit</button>
        <div class="tb-sep"></div>
        <button class="zb" onclick="setZoom(1)">100%</button>
      </div>

      <!-- Lot detail panel -->
      <div class="rpanel" id="rpanel">
        <div class="rph"><span class="rph-t" id="rp-title">Lot</span><button class="rph-x" onclick="closeDetail()">×</button></div>
        <div class="rpb" id="rp-body"></div>
        <div class="rpa">
          <button class="rpbtn" onclick="editLotOpen()"><i class="ti ti-edit"></i> Edit lot</button>
          <button class="rpbtn danger" onclick="clearLotData()"><i class="ti ti-trash"></i> Clear lot data</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- NEW DEVELOPER MODAL -->
<div class="overlay" id="new-dev-overlay">
  <div class="modal">
    <div class="mh"><span class="mh-t">New developer</span><button class="mh-x" onclick="closeNewDev()">×</button></div>
    <div class="mb">
      <div class="fg"><label>Company / Developer name</label><input id="nd-name" placeholder="Tricar Group"/></div>
      <div class="g2">
        <div class="fg"><label>Phone</label><input id="nd-phone" placeholder="(705) 555-0100"/></div>
        <div class="fg"><label>Email</label><input id="nd-email" type="email"/></div>
      </div>
      <div class="fg"><label>Address</label><input id="nd-address"/></div>
      <div class="fg"><label>Notes</label><textarea id="nd-notes"></textarea></div>
    </div>
    <div class="mf">
      <button class="mbtn" onclick="closeNewDev()">Cancel</button>
      <button class="mbtn primary" onclick="saveNewDev()"><i class="ti ti-check"></i> Create developer</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="settings-overlay">
  <div class="modal">
    <div class="mh"><span class="mh-t">Development settings</span><button class="mh-x" onclick="closeSettings()">×</button></div>
    <div class="mb">
      <div class="g2">
        <div class="fg"><label>Title</label><input id="s-title"/></div>
        <div class="fg"><label>Developer</label><select id="s-developer-id"></select></div>
      </div>
      <div class="fg">
        <label>Project stages</label>
        <div class="stage-list" id="stage-list"></div>
        <button class="nbtn" style="margin-top:6px;font-size:11px" onclick="addStageInput()"><i class="ti ti-plus"></i> Add stage</button>
      </div>
    </div>
    <div class="mf">
      <button class="mbtn" style="color:var(--red);border-color:var(--red);margin-right:auto" onclick="deleteDevelopment()"><i class="ti ti-trash"></i> Delete</button>
      <button class="mbtn" onclick="closeSettings()">Cancel</button>
      <button class="mbtn primary" onclick="saveSettings()"><i class="ti ti-check"></i> Save</button>
    </div>
  </div>
</div>

<!-- LOT EDIT MODAL -->
<div class="overlay" id="lot-overlay">
  <div class="modal">
    <div class="mh"><span class="mh-t" id="lot-modal-title">Lot details</span><button class="mh-x" onclick="closeLotModal()">×</button></div>
    <div class="mb">
      <div class="g2">
        <div class="fg"><label>Customer</label><input id="l-customer"/></div>
        <div class="fg"><label>Phone</label><input id="l-phone"/></div>
      </div>
      <div class="fg"><label>Email</label><input id="l-email" type="email"/></div>
      <div class="fg"><label>Notes</label><textarea id="l-notes"></textarea></div>
      <div class="fg"><label>Stage</label><select id="l-stage"></select></div>
    </div>
    <div class="mf">
      <button class="mbtn" onclick="closeLotModal()">Cancel</button>
      <button class="mbtn primary" onclick="saveLotData()"><i class="ti ti-check"></i> Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL='https://vojgddmlwakvhmbkzfld.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvamdkZG1sd2FrdmhtYmt6ZmxkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NDQ1MzAsImV4cCI6MjA5NzIyMDUzMH0.PGu1HeCZ3SsMgRyLC_s4xP8m3Qt73NlRyvzA-hFroEk';
const ST_URL=`${SB_URL}/storage/v1/object/public/site-plans`;

async function db(path,opts={}){
  const isW=opts.method&&opts.method!=='GET';
  const r=await fetch(`${SB_URL}/rest/v1/${path}`,{
    headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json',
      ...(isW?{'Prefer':'return=representation'}:{}),...(opts.headers||{})},
    ...opts
  });
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const t=await r.text();return t?JSON.parse(t):[];
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function safeJson(v,d){try{return v?(typeof v==='string'?JSON.parse(v):v):d;}catch{return d;}}

// ── ROUTING ───────────────────────────────────────────────────
const params=new URLSearchParams(location.search);
const DEV_ID=params.get('id')?parseInt(params.get('id')):null;
DEV_ID?initSite():initIndex();

// ══ INDEX ═════════════════════════════════════════════════════
async function initIndex(){
  document.getElementById('index-view').style.display='block';
  try{
    const[devs,sites]=await Promise.all([
      db('developers?select=*&order=name'),
      db('developments?select=id,title,developer_id,lots&order=created_at.desc')
    ]);
    renderIndex(devs,sites);
  }catch(e){document.getElementById('dev-grid').innerHTML=`<div style="color:var(--red);font-size:13px">Load failed: ${esc(e.message)}</div>`;}
}

function renderIndex(devs,sites){
  const grid=document.getElementById('dev-grid');
  if(!devs.length){grid.innerHTML='<div class="empty-index"><i class="ti ti-building-community"></i>No developers yet.<br>Click <strong>New developer</strong> to get started.</div>';return;}
  grid.innerHTML=devs.map(dev=>{
    const s=sites.filter(x=>x.developer_id===dev.id);
    const tl=s.reduce((a,x)=>a+safeJson(x.lots,[]).length,0);
    const dn=s.reduce((a,x)=>a+safeJson(x.lots,[]).filter(l=>(l.stage||0)>=4).length,0);
    const rows=s.map(x=>{
      const lots=safeJson(x.lots,[]),done=lots.filter(l=>(l.stage||0)>=4).length,pct=lots.length?Math.round(done/lots.length*100):0;
      return`<div class="dev-site-row" onclick="location.href='/development.html?id=${x.id}'">
        <span class="dev-site-name">${esc(x.title||'Unnamed')}</span>
        <span class="dev-site-stats">${lots.length} lots</span>
        <div class="dev-site-prog"><div class="dev-site-prog-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('')||'<div class="no-sites" style="font-size:12px;color:var(--muted);padding:4px 0">No developments yet</div>';
    return`<div class="dev-card">
      <div class="dev-card-name">${esc(dev.name)}</div>
      <div class="dev-card-meta">${[dev.phone,dev.email].filter(Boolean).join(' · ')}</div>
      <div class="dev-card-sites">${rows}</div>
      <div class="dev-card-footer">
        <div class="dev-stat"><div class="n">${s.length}</div><div class="l">Sites</div></div>
        <div class="dev-stat"><div class="n">${tl}</div><div class="l">Lots</div></div>
        <div class="dev-stat"><div class="n">${tl-dn}</div><div class="l">Active</div></div>
        <div class="dev-stat"><div class="n">${dn}</div><div class="l">Done</div></div>
      </div>
    </div>`;
  }).join('');
}

function openNewDev(){['nd-name','nd-phone','nd-email','nd-address','nd-notes'].forEach(id=>document.getElementById(id).value='');document.getElementById('new-dev-overlay').classList.add('open');}
function closeNewDev(){document.getElementById('new-dev-overlay').classList.remove('open');}
async function saveNewDev(){
  const name=document.getElementById('nd-name').value.trim();
  if(!name){toast('Enter a developer name');return;}
  try{
    await db('developers',{method:'POST',body:JSON.stringify({name,phone:document.getElementById('nd-phone').value.trim()||null,email:document.getElementById('nd-email').value.trim()||null,address:document.getElementById('nd-address').value.trim()||null,notes:document.getElementById('nd-notes').value.trim()||null})});
    closeNewDev();initIndex();toast('Developer created');
  }catch(e){toast('Error: '+e.message);}
}

// ══ SITE VIEW ═════════════════════════════════════════════════
const DEFAULT_STAGES=['Site visit','Rough-in','Inspection','Final'];
const LOT_COLOURS=['#1a6eff','#BA7517','#1e7e34','#dc3545','#888','#6f42c1'];
const UNASSIGNED_FILL='#c8dda8'; // default lot colour (matches SVG cls-1 approximated)
const UNASSIGNED_STROKE='#1a1a1a';

let dev=null,allDevs=[];
let lots=[]; // [{shapeId, customer, phone, email, notes, stage}]
let selLotId=null;
let editingLotId=null;
let zoom=1,panX=0,panY=0;
let isPanning=false,panStart=null;

function lotColour(lot){
  const stages=dev?.stages||DEFAULT_STAGES;
  const done=lot?.stage||0;
  if(done>=stages.length)return'#1e7e34';
  if(done===0)return UNASSIGNED_FILL;
  return LOT_COLOURS[(done-1)%LOT_COLOURS.length];
}

// ── INIT ──────────────────────────────────────────────────────
async function initSite(){
  document.getElementById('site-view').style.display='block';
  document.getElementById('nav-primary-btn').innerHTML='<i class="ti ti-settings"></i> Settings';
  document.getElementById('nav-primary-btn').onclick=openSettings;
  const back=document.createElement('a');back.className='nbtn';back.href='/development.html';back.innerHTML='<i class="ti ti-arrow-left"></i> Developers';
  document.getElementById('nav-right').prepend(back);

  try{
    const[rows,devRows]=await Promise.all([
      db(`developments?id=eq.${DEV_ID}&select=*,developers(name)`),
      db('developers?select=id,name&order=name')
    ]);
    allDevs=devRows;
    if(!rows.length){toast('Not found');return;}
    dev=rows[0];
    dev.stages=safeJson(dev.stages,DEFAULT_STAGES);
    lots=safeJson(dev.lots,[]);
    document.getElementById('nav-label').textContent=dev.title||'Development';
    document.title=`${dev.title||'Development'} — Ampersend`;

    // Load the SVG for this development
    await loadSVG();
    renderStats();
    renderLotList();
    setupPanZoom();
    setTimeout(fitView,80);
  }catch(e){toast('Load failed: '+e.message);}
}

// ── SVG LOADING ───────────────────────────────────────────────
async function loadSVG(){
  // If dev has a custom SVG url, fetch it; otherwise use embedded default
  let svgText;
  if(dev.svg_url){
    try{
      const r=await fetch(dev.svg_url);
      svgText=await r.text();
    }catch(e){
      toast('Could not load SVG, using default');
      svgText=getDefaultSVG();
    }
  } else {
    svgText=getDefaultSVG();
  }
  injectSVG(svgText);
}

function injectSVG(svgText){
  const parser=new DOMParser();
  const doc=parser.parseFromString(svgText,'image/svg+xml');
  const svgEl=doc.querySelector('svg');
  if(!svgEl)return;

  const planSvg=document.getElementById('plan-svg');
  planSvg.setAttribute('viewBox',svgEl.getAttribute('viewBox')||'0 0 1600 1200');
  planSvg.innerHTML=svgEl.innerHTML;

  // ── RESTYLE ──────────────────────────────────────────────
  // Background
  planSvg.style.background='#f5f5f7';

  // Restyle all lot fills and strokes
  const lotsGroup=planSvg.querySelector('#Lots');
  if(lotsGroup){
    lotsGroup.querySelectorAll('[id^="Lot-"]').forEach(g=>{
      const paths=[...g.querySelectorAll('path,rect,polygon')];
      if(paths.length>=2){
        // First path = fill shape
        paths[0].style.fill='#e4e4e6';
        paths[0].style.stroke='none';
        // Second path = outline (stroke matches background)
        paths[1].style.fill='#f5f5f7';
        paths[1].style.stroke='none';
      } else if(paths.length===1){
        paths[0].style.fill='#e4e4e6';
        paths[0].style.stroke='#f5f5f7';
        paths[0].style.strokeWidth='2';
      }
    });
  }

  // Restyle labels — muted grey
  const labelsGroup=planSvg.querySelector('#Labels');
  if(labelsGroup){
    labelsGroup.querySelectorAll('path,text').forEach(el=>{
      el.style.fill='#a0a0a8';
    });
  }

  // ── ADD LOT NUMBERS ───────────────────────────────────────
  addLotNumbers(planSvg);

  // Wire clicks + apply colours
  wireLotClicks();
  applyAllLotColours();
}

function addLotNumbers(planSvg){
  const lotsGroup=planSvg.querySelector('#Lots');
  if(!lotsGroup)return;
  const ns='http://www.w3.org/2000/svg';
  const numLayer=document.createElementNS(ns,'g');
  numLayer.id='lot-numbers';
  numLayer.style.pointerEvents='none';

  lotsGroup.querySelectorAll('[id^="Lot-"]').forEach(g=>{
    const num=g.id.split('-')[1];
    // Get bounding box of the fill shape (first child)
    const fillEl=g.querySelector('path,rect,polygon');
    if(!fillEl)return;
    try{
      const bb=fillEl.getBBox();
      if(bb.width<8||bb.height<8)return;
      const cx=bb.x+bb.width/2;
      const cy=bb.y+bb.height/2;
      const fs=Math.max(7,Math.min(11,Math.min(bb.width,bb.height)*0.28));
      const t=document.createElementNS(ns,'text');
      t.setAttribute('x',cx);
      t.setAttribute('y',cy);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('dominant-baseline','middle');
      t.setAttribute('font-size',fs);
      t.setAttribute('font-family','-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif');
      t.setAttribute('font-weight','500');
      t.setAttribute('fill','#9090a0');
      t.setAttribute('data-lot-id',g.id);
      t.textContent=num;
      numLayer.appendChild(t);
    }catch(e){}
  });
  planSvg.appendChild(numLayer);
}

function wireLotClicks(){
  const planSvg=document.getElementById('plan-svg');
  const lotsGroup=planSvg.querySelector('#Lots');
  if(!lotsGroup)return;
  lotsGroup.querySelectorAll('[id^="Lot-"]').forEach(g=>{
    g.style.cursor='pointer';
    // Hover — brighten fill slightly
    g.addEventListener('mouseenter',()=>{
      if(g.id===selLotId)return;
      const fillEl=g.querySelector('path,rect,polygon');
      if(fillEl)fillEl.style.opacity='0.75';
      // Show tooltip
      showLotTooltip(g.id,g);
    });
    g.addEventListener('mouseleave',()=>{
      const fillEl=g.querySelector('path,rect,polygon');
      if(fillEl)fillEl.style.opacity='';
      hideLotTooltip();
    });
    g.addEventListener('click',e=>{
      e.stopPropagation();
      selectLot(g.id);
    });
  });
  planSvg.addEventListener('click',e=>{
    if(!e.target.closest('[id^="Lot-"]')&&selLotId)deselectLot();
  });
}

// Tooltip
let _tooltip=null;
function showLotTooltip(id,g){
  hideLotTooltip();
  const num=id.replace('Lot-','Lot ');
  const ld=lots.find(l=>l.shapeId===id);
  const stages=dev?.stages||DEFAULT_STAGES;
  const stage=ld?(ld.stage||0)>=stages.length?'Complete':stages[ld.stage||0]||'Unassigned':'Unassigned';
  const t=document.createElement('div');
  t.id='lot-tooltip';
  t.style.cssText='position:fixed;background:#1a1a1a;color:#fff;padding:5px 10px;border-radius:5px;font-size:11px;font-weight:500;pointer-events:none;z-index:999;white-space:nowrap;transform:translate(-50%,-100%) translateY(-8px)';
  t.innerHTML=`<span style="font-weight:700">${num}</span>${ld?.customer?` · ${ld.customer}`:''}<span style="opacity:0.6;margin-left:6px">${stage}</span>`;
  document.body.appendChild(t);
  _tooltip=t;
  // Position on mousemove
  const move=e=>{t.style.left=e.clientX+'px';t.style.top=e.clientY+'px';};
  document.addEventListener('mousemove',move);
  t._move=move;
}
function hideLotTooltip(){
  if(_tooltip){document.removeEventListener('mousemove',_tooltip._move);_tooltip.remove();_tooltip=null;}
}

function selectLot(id){
  if(selLotId&&selLotId!==id){
    const prev=document.getElementById(selLotId);
    if(prev){
      const prevFill=prev.querySelector('path,rect,polygon');
      if(prevFill){prevFill.style.filter='';prevFill.style.strokeWidth='';}
    }
  }
  selLotId=id;
  const g=document.getElementById(id);
  if(g){
    const fillEl=g.querySelector('path,rect,polygon');
    if(fillEl){fillEl.style.filter='drop-shadow(0 0 3px rgba(26,110,255,0.8))';fillEl.style.strokeWidth='2';}
  }
  renderLotList();
  showDetail(id);
}

function deselectLot(){
  if(selLotId){
    const g=document.getElementById(selLotId);
    if(g){
      const fillEl=g.querySelector('path,rect,polygon');
      if(fillEl){fillEl.style.filter='';fillEl.style.strokeWidth='';}
    }
  }
  selLotId=null;
  document.getElementById('rpanel').classList.remove('open');
  renderLotList();
}

function applyAllLotColours(){
  const planSvg=document.getElementById('plan-svg');
  const lotsGroup=planSvg.querySelector('#Lots');
  if(!lotsGroup)return;
  lotsGroup.querySelectorAll('[id^="Lot-"]').forEach(g=>{
    applyLotColour(g.id);
  });
}

function applyLotColour(id){
  const g=document.getElementById(id);
  if(!g)return;
  const ld=lots.find(l=>l.shapeId===id);
  const col=lotColour(ld);
  const fillEl=g.querySelector('path,rect,polygon');
  if(fillEl)fillEl.style.fill=col;
  // Update number text colour — white on coloured lots, muted on unassigned
  const txt=document.querySelector(`#lot-numbers [data-lot-id="${id}"]`);
  if(txt)txt.setAttribute('fill',(!ld||(ld.stage||0)===0)?'#9090a0':'rgba(255,255,255,0.8)');
}

// ── DETAIL PANEL ──────────────────────────────────────────────
function showDetail(id){
  const ld=lots.find(l=>l.shapeId===id);
  const stages=dev?.stages||DEFAULT_STAGES;
  const done=ld?.stage||0;
  document.getElementById('rp-title').textContent=id.replace('-',' ');
  const stageRows=stages.map((s,i)=>`
    <button class="stage-btn ${i<done?'done-s':''} ${i===done?'active-s':''}" onclick="setLotStage('${id}',${i+1})">
      <i class="ti ti-${i<done?'check':'circle'}"></i>${esc(s)}
    </button>`).join('');
  document.getElementById('rp-body').innerHTML=`
    ${ld?.customer?`<div class="rpf"><div class="rpl">Customer</div><div class="rpv">${esc(ld.customer)}</div></div>`:''}
    ${ld?.phone?`<div class="rpf"><div class="rpl">Phone</div><div class="rpv">${esc(ld.phone)}</div></div>`:''}
    ${ld?.email?`<div class="rpf"><div class="rpl">Email</div><div class="rpv">${esc(ld.email)}</div></div>`:''}
    ${ld?.notes?`<div class="rpf"><div class="rpl">Notes</div><div class="rpv">${esc(ld.notes)}</div></div>`:''}
    <div class="rpf"><div class="rpl">Stage</div><div class="stage-row">${stageRows}</div></div>`;
  document.getElementById('rpanel').classList.add('open');
}

function closeDetail(){
  deselectLot();
  document.getElementById('rpanel').classList.remove('open');
}

async function setLotStage(id,stage){
  let ld=lots.find(l=>l.shapeId===id);
  if(!ld){ld={shapeId:id};lots.push(ld);}
  ld.stage=stage;
  await saveLots();
  applyLotColour(id);
  showDetail(id);
  renderStats();
  renderLotList();
}

function editLotOpen(){
  if(!selLotId)return;
  editingLotId=selLotId;

function closeLotModal(){document.getElementById('lot-overlay').classList.remove('open');}
async function saveLotData(){
  let ld=lots.find(l=>l.shapeId===editingLotId);
  if(!ld){ld={shapeId:editingLotId};lots.push(ld);}
  ld.customer=document.getElementById('l-customer').value.trim();
  ld.phone=document.getElementById('l-phone').value.trim();
  ld.email=document.getElementById('l-email').value.trim();
  ld.notes=document.getElementById('l-notes').value.trim();

  closeLotModal();
  showDetail(editingLotId);
  renderStats();renderLotList();

async function clearLotData(){
  if(!selLotId)return;
  lots=lots.filter(l=>l.shapeId!==selLotId);
  await saveLots();
  applyLotColour(selLotId);
  closeDetail();
  renderStats();renderLotList();
  toast('Cleared');
}

// ── SIDEBAR ───────────────────────────────────────────────────
function renderStats(){
  const stages=dev?.stages||DEFAULT_STAGES;
  const planSvg=document.getElementById('plan-svg');
  const lotsGroup=planSvg?.querySelector('#Lots');
  const lotEls=lotsGroup?[...lotsGroup.querySelectorAll('[id^="Lot-"]')]:[];
  const total=lotEls.length;
  const done=lots.filter(l=>(l.stage||0)>=(stages.length)).length;
  const active=lots.filter(l=>(l.stage||0)>0&&(l.stage||0)<stages.length).length;
  document.getElementById('st-total').textContent=total;
  document.getElementById('st-active').textContent=active;
  document.getElementById('st-done').textContent=done;
}

function renderLotList(){
  const list=document.getElementById('lot-list');
  const planSvg=document.getElementById('plan-svg');
  const lotsGroup=planSvg?.querySelector('#Lots');
  if(!lotsGroup){list.innerHTML='';return;}
  const lotEls=[...lotsGroup.querySelectorAll('[id^="Lot-"]')].sort((a,b)=>{
    return parseInt(a.id.split('-')[1])-parseInt(b.id.split('-')[1]);
  });
  const stages=dev?.stages||DEFAULT_STAGES;
  list.innerHTML=lotEls.map(el=>{
    const id=el.id;
    const ld=lots.find(l=>l.shapeId===id);
    const done=ld?.stage||0,total=stages.length,pct=Math.round(done/total*100);
    const stageName=done>=total?'Complete':(ld&&done>0?stages[done-1]:'Unassigned');
    const col=lotColour(ld);
    return`<div class="lot-item ${selLotId===id?'sel':''}" onclick="selectLot('${id}');showDetail('${id}')">
      <div class="lot-dot" style="background:${col}"></div>
      <div class="lot-info">
        <div class="lot-name">${id.replace('-',' ')}</div>
        <div class="lot-stage">${esc(stageName)}</div>
        <div class="lot-prog"><div class="lot-prog-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  }).join('');
}

// ── PAN / ZOOM ────────────────────────────────────────────────
const outer=document.getElementById('svg-outer');
const mainWrap=document.getElementById('main-wrap');

function setZoom(z){zoom=Math.max(0.1,Math.min(5,z));applyTransform();}
function adjustZoom(d){setZoom(zoom+d);}
function applyTransform(){outer.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;}
function fitView(){
  const ww=mainWrap.clientWidth,wh=mainWrap.clientHeight;
  zoom=Math.min(ww/1600,wh/1200);
  panX=(ww-1600*zoom)/2;panY=(wh-1200*zoom)/2;
  applyTransform();
}

function setupPanZoom(){
  // Pan with drag
  mainWrap.addEventListener('mousedown',e=>{
    if(e.button===0&&!e.target.closest('[id^="Lot-"]')){
      isPanning=true;panStart={x:e.clientX-panX,y:e.clientY-panY};
      mainWrap.style.cursor='grabbing';
    }
  });
  window.addEventListener('mousemove',e=>{
    if(isPanning){panX=e.clientX-panStart.x;panY=e.clientY-panStart.y;applyTransform();}
  });
  window.addEventListener('mouseup',()=>{isPanning=false;mainWrap.style.cursor='';});
  // Pinch/scroll zoom
  mainWrap.addEventListener('wheel',e=>{
    e.preventDefault();
    const prev=zoom;zoom=Math.max(0.3,Math.min(5,zoom+(e.deltaY<0?0.08:-0.08)));
    const r=mainWrap.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
    panX=mx-(mx-panX)*(zoom/prev);panY=my-(my-panY)*(zoom/prev);
    applyTransform();
  },{passive:false});
}

  try{await db(`developments?id=eq.${DEV_ID}`,{method:'DELETE'});window.location.href='/development.html';}

}
